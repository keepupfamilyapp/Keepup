// Inline manifest
const md=JSON.stringify({name:"Keep Up",short_name:"Keep Up",start_url:"./",display:"standalone",background_color:"#FAF6F0",theme_color:"#C4714A",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%23C4714A'/%3E%3Ctext y='140' x='96' font-size='110' text-anchor='middle'%3E%F0%9F%8F%A1%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]});
document.getElementById('pwa-manifest').href=URL.createObjectURL(new Blob([md],{type:'application/json'}));
// Inline service worker
if('serviceWorker' in navigator){const sw=`const C='ku1';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request)));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});}
</script>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{font-family:'Nunito',sans-serif;background:#FAF6F0;color:#3D2314;}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;position:relative;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}
button,input,select,textarea{font-family:'Nunito',sans-serif;-webkit-appearance:none;border-radius:0;}
button:active{opacity:.82;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .3s ease both;}
.float{animation:float 3s ease-in-out infinite;}
.pulse-btn{animation:pulse 2.5s ease-in-out infinite;}
</style>

function App(){
  const [boarded,setBoarded]=useState(localStorage.getItem("ku_ob")==="1");
  const [obStep,setObStep]=useState(0);
  const [obName,setObName]=useState(localStorage.getItem("ku_name")||"");

  const [obGrpName,setObGrpName]=useState("");
  const [obGrpEmoji,setObGrpEmoji]=useState("❤️");

  const [tab,setTab]=useState("feed");
  const [activeGrp,setActiveGrp]=useState("imm");
  const [groups,setGroups]=useState(INIT_GROUPS);
  const [screen,setScreen]=useState("main");
  const [manageGrp,setManageGrp]=useState("imm");

  const [rxPicker,setRxPicker]=useState(null);
  const [rsvp,setRsvp]=useState({});

  const [cmtOpen,setCmtOpen]=useState(null);

  const [showEmpty,setShowEmpty]=useState(false);
  const [grpName,setGrpName]=useState("");
  const [grpEmoji,setGrpEmoji]=useState("❤️");
  const [copied,setCopied]=useState(false);

  // upload
  const [upOpen,setUpOpen]=useState(false);
  const [upStep,setUpStep]=useState(1);
  const [upType,setUpType]=useState("photo");
  const [upEmoji,setUpEmoji]=useState("🌻");
  const [upCap,setUpCap]=useState("");
  const [upCi,setUpCi]=useState("");
  const [feed,setFeed]=useState(FEED);
  const [preview,setPreview]=useState(null);
  const fileRef=useRef(null);

  // chat
  const [openChat,setOpenChat]=useState(null);
  const [newDmOpen,setNewDmOpen]=useState(false);
  const [dmGrp,setDmGrp]=useState("imm");
  const [dmSel,setDmSel]=useState([]);
  const [chatInputs,setChatInputs]=useState({});
  const [chatMsgs,setChatMsgs]=useState({"dm-1":[
    {id:1,av:"👦",name:"Jake",text:"Hey, are you joining Easter brunch?",time:"Yesterday"},
    {id:2,av:"👩",name:"You",text:"Yes! Bringing potato salad 🥗",time:"Yesterday",you:true},
    {id:3,av:"👦",name:"Jake",text:"Perfect!! Can't wait 🐣",time:"Yesterday"},
  ]});
  const [dms,setDms]=useState([{id:"dm-1",members:[{id:3,av:"👦",name:"Jake"}],last:"Perfect!! Can't wait 🐣",lt:"Yesterday"}]);

  useEffect(()=>{if(obName)localStorage.setItem("ku_name",obName);},[obName]);
  useEffect(()=>{localStorage.setItem("ku_av",obAv);},[obAv]);

  const fs=textSz==="xlarge"?1.22:textSz==="large"?1.1:1;
  const px=n=>Math.round(n*fs)+"px";
  const t=gt(activeGrp);
  const ag=groups.find(g=>g.id===activeGrp)||groups[0];
  const getM=gid=>members[gid]||[{id:1,av:"👩",name:"You",role:"Admin",you:true}];
  const isAdmin=gid=>!!getM(gid).find(x=>x.you&&x.role==="Admin");
  const pCmts=id=>comments[id]||[];

  const doReact=(id,e)=>{setReactions(r=>({...r,[id]:r[id]===e?null:e}));setRxPicker(null);};
  const addCmt=pid=>{
    if(!cmtInput.trim())return;
    setComments(p=>({...p,[pid]:[...(p[pid]||[]),{id:Date.now(),av:obAv,name:obName||"You",text:cmtInput.trim(),time:"Just now"}]}));
    setCmtInput("");
  };
  const addEvent=()=>{
    if(!newEv.title.trim()||!newEv.day)return;
    setEvents(e=>[...e,{...newEv,id:Date.now(),going:1,maybe:0,day:parseInt(newEv.day)||1}]);
    setNewEv({title:"",month:"APR",day:"",time:"",loc:"",group:"Immediate"});
    setAddEvOpen(false);
  };
  const openUpload=type=>{
    setUpType(type);setUpStep(type==="photo"?2:3);

    if(!grpName.trim())return;
    const id="g"+Date.now();

    if(obGrpName.trim())setGroups([{id:"imm",label:obGrpName,icon:obGrpEmoji}]);

    <div id="app" style=${{background:"#FAF6F0"}}>
      ${obStep>0&&obStep<5&&html`

            <div class="float" style=${{fontSize:"80px",filter:"drop-shadow(0 12px 24px rgba(0,0,0,.15))"}}>🏡</div>
          </div>

            <div style=${{fontFamily:"Lora,serif",fontSize:"32px",fontWeight:600,color:"#C4714A",marginBottom:"8px",textAlign:"center"}}>keep <em>up</em></div>
            <div style=${{fontSize:"16px",color:"#6B4C35",textAlign:"center",lineHeight:1.65,marginBottom:"6px"}}>Stay close to the people who matter most.</div>
            <div style=${{fontSize:"14px",color:"#9B7B62",textAlign:"center",lineHeight:1.6,marginBottom:"32px"}}>No ads. No algorithms. Just your family.</div>
            ${btn("Get Started →",()=>setObStep(1),false)}
          </div>
        </div>
      `}

      ${step==="name"&&html`
        <div style=${{flex:1,display:"flex",flexDirection:"column",padding:"80px 28px 40px",animation:"fadeUp .4s ease both"}}>
          <div style=${{fontFamily:"Lora,serif",fontSize:"26px",fontWeight:600,color:"#3D2314",marginBottom:"8px"}}>What's your name?</div>
          <div style=${{fontSize:"15px",color:"#9B7B62",marginBottom:"28px",lineHeight:1.6}}>Use whatever your family calls you — <strong style=${{color:"#C4714A"}}>"Mom"</strong>, <strong style=${{color:"#C4714A"}}>"Grandpa Joe"</strong>, <strong style=${{color:"#C4714A"}}>"Jake"</strong></div>

            style=${{padding:"18px 20px",borderRadius:"16px",border:"2px solid #E8956D",background:"#FFF9F2",fontSize:"18px",color:"#3D2314",outline:"none",marginBottom:"12px",width:"100%"}}/>
          <div style=${{flex:1}}></div>
          ${btn("Continue →",()=>setObStep(2),!canNext)}

      `}

      ${step==="avatar"&&html`
        <div style=${{flex:1,display:"flex",flexDirection:"column",padding:"80px 28px 40px",animation:"fadeUp .4s ease both"}}>

  // ── MANAGE GROUP ────────────────────────────────────────────────────────────
  if(screen==="manageGroup"){

  // ── CREATE GROUP ────────────────────────────────────────────────────────────
  if(screen==="createGroup"){

      <!-- FEED WITH POSTS -->

                ${reactions[item.id]&&html`<div style=${{display:"flex",alignItems:"center",gap:"5px",padding:"6px 12px",borderRadius:"50px",background:t.ap,border:`1.5px solid ${t.al}`,fontSize:px(13),fontWeight:600,color:t.ad}}>${reactions[item.id]} <span style=${{fontSize:px(11)}}>You reacted</span></div>`}
                <button onClick=${()=>setRxPicker(rxPicker===item.id?null:item.id)} style=${{display:"flex",alignItems:"center",gap:"5px",padding:"7px 13px",borderRadius:"50px",background:t.bg,border:`2px solid ${t.ap}`,fontSize:px(13),fontWeight:700,color:"#6B4C35",cursor:"pointer"}}>😊 ${reactions[item.id]?"Change":"React"}</button>
                <button onClick=${()=>{setCmtOpen(item.id);setCmtInput("");}} style=${{display:"flex",alignItems:"center",gap:"5px",padding:"7px 13px",borderRadius:"50px",background:t.bg,border:`2px solid ${t.ap}`,fontSize:px(13),fontWeight:700,color:"#6B4C35",cursor:"pointer",marginLeft:"auto"}}>💬 ${pc.length>0?pc.length:"Comment"}</button>
                ${rxPicker===item.id&&html`<div style=${{width:"100%",display:"flex",gap:"8px",padding:"8px 0 2px",animation:"popIn .18s ease"}}>
                  ${REACTIONS.map(e=>html`<button onClick=${()=>doReact(item.id,e)} style=${{flex:1,fontSize:"24px",padding:"9px 0",borderRadius:"13px",background:reactions[item.id]===e?t.ap:t.bg,border:`2px solid ${reactions[item.id]===e?t.al:t.ap}`,cursor:"pointer"}}>${e}</button>`)}

              </div>
              ${pc.length>0&&html`

                <span style=${{fontSize:"16px"}}>${pc[pc.length-1].av}</span>
                <div style=${{flex:1,minWidth:0}}><span style=${{fontSize:px(12),fontWeight:700,color:t.ad}}>${pc[pc.length-1].name}: </span><span style=${{fontSize:px(12),color:"#6B4C35"}}>${pc[pc.length-1].text}</span></div>
                ${pc.length>1&&html`<span style=${{fontSize:px(11),color:"#9B7B62",flexShrink:0}}>+${pc.length-1}</span>`}

    </div>`}

    <!-- BOTTOM NAV -->
    <div style=${{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:t.cb,borderTop:`2px solid ${t.ap}`,display:"flex",padding:"10px 0 20px",zIndex:50,flexShrink:0}}>
      ${[{id:"feed",icon:"🏠",label:"Home"},{id:"chat",icon:"💬",label:"Chat"},{id:"calendar",icon:"📅",label:"Calendar"},{id:"profile",icon:"👤",label:"Profile"}].map(n=>html`
      <div onClick=${()=>{setTab(n.id);if(n.id==="chat")setOpenChat(null);}} style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",cursor:"pointer",padding:"3px 0"}}>
        <span style=${{fontSize:"22px"}}>${n.icon}</span>
        <span style=${{fontSize:px(10),fontWeight:800,color:tab===n.id?t.a:"#9B7B62",letterSpacing:".2px"}}>${n.label}</span>
        ${tab===n.id&&html`<div style=${{width:"18px",height:"3px",borderRadius:"3px",background:t.a}}></div>`}
      </div>`)}
    </div>

    <!-- COMPOSE SHEET -->
    ${composeOpen&&html`
    <${Overlay} onClose=${()=>setComposeOpen(false)}>
      ${handle()}
      <div style=${{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314",marginBottom:"4px"}}>What would you like to share?</div>
      <div style=${{fontSize:px(13),color:"#9B7B62",marginBottom:"16px"}}>Sharing with: <strong style=${{color:t.a}}>${ag.icon} ${ag.label}</strong></div>
      <div style=${{display:"flex",flexDirection:"column",gap:"10px"}}>
        ${[{icon:"📷",label:"Share a Photo",sub:"Add a photo with a caption",type:"photo"},{icon:"📍",label:"Post a Check-in",sub:"Let family know how you're doing",type:"checkin"},{icon:"📅",label:"Add an Event",sub:"Add to the family calendar",type:"event"}].map(opt=>html`
        <div onClick=${()=>{if(opt.type==="event"){setComposeOpen(false);setAddEvOpen(true);}else openUpload(opt.type);}} style=${{background:t.bg,border:`2px solid ${t.ap}`,borderRadius:"18px",padding:"14px 15px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}}>
          <div style=${{fontSize:"25px",width:"46px",height:"46px",borderRadius:"13px",background:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${t.ap}`}}>${opt.icon}</div>
          <div><div style=${{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>${opt.label}</div><div style=${{fontSize:px(12),color:"#9B7B62",marginTop:"2px"}}>${opt.sub}</div></div>
          <span style=${{marginLeft:"auto",fontSize:"18px",color:t.al}}>›</span>
        </div>`)}
      </div>
    </${Overlay}>`}

    <!-- ADD EVENT -->
    ${addEvOpen&&html`
    <${Overlay} onClose=${()=>setAddEvOpen(false)} maxH="88vh">
      ${handle()}
      <div style=${{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314",marginBottom:"16px"}}>Add an Event 📅</div>
      ${[{label:"Event Name",placeholder:"e.g. Easter Brunch…",field:"title"},{label:"Time",placeholder:"e.g. 10:00 AM",field:"time"},{label:"Location",placeholder:"e.g. Grandma's house",field:"loc"}].map(f=>html`
      <div style=${{marginBottom:"14px"}}>
        <label style=${{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:".4px",textTransform:"uppercase",marginBottom:"6px",display:"block"}}>${f.label}</label>
        <input value=${newEv[f.field]} onInput=${e=>setNewEv(n=>({...n,[f.field]:e.target.value}))} placeholder=${f.placeholder}
          style=${{width:"100%",padding:"13px 14px",borderRadius:"14px",border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(15),color:"#3D2314",outline:"none"}}/>
      </div>`)}
      <div style=${{display:"flex",gap:"10px",marginBottom:"14px"}}>
        <div style=${{flex:1}}>
          <label style=${{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:".4px",textTransform:"uppercase",marginBottom:"6px",display:"block"}}>Month</label>
          <select value=${newEv.month} onChange=${e=>setNewEv(n=>({...n,month:e.target.value}))} style=${{width:"100%",padding:"13px 14px",borderRadius:"14px",border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(14),color:"#3D2314",outline:"none"}}>
            ${["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].map(m=>html`<option>${m}</option>`)}
          </select>
        </div>
        <div style=${{flex:1}}>
          <label style=${{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:".4px",textTransform:"uppercase",marginBottom:"6px",display:"block"}}>Day</label>
          <input type="number" min="1" max="31" value=${newEv.day} onInput=${e=>setNewEv(n=>({...n,day:e.target.value}))} placeholder="1–31"
            style=${{width:"100%",padding:"13px 14px",borderRadius:"14px",border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(14),color:"#3D2314",outline:"none"}}/>
        </div>
      </div>
      <div style=${{marginBottom:"18px"}}>
        <label style=${{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:".4px",textTransform:"uppercase",marginBottom:"6px",display:"block"}}>Group</label>
        <select value=${newEv.group} onChange=${e=>setNewEv(n=>({...n,group:e.target.value}))} style=${{width:"100%",padding:"13px 14px",borderRadius:"14px",border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(14),color:"#3D2314",outline:"none"}}>
          ${groups.map(g=>html`<option>${g.label}</option>`)}
        </select>
      </div>
      ${btn("Add to Calendar",addEvent,!newEv.title.trim()||!newEv.day)}
    </${Overlay}>`}

    <!-- EVENT DETAIL -->
    ${selEv&&html`
    <${Overlay} onClose=${()=>setSelEv(null)}>
      ${handle()}
      <div style=${{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}}>
        <div style=${{width:"54px",height:"54px",borderRadius:"16px",background:"#D4922A",color:"white",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style=${{fontSize:"9px",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>${selEv.month}</span>
          <span style=${{fontSize:"22px",fontWeight:700,lineHeight:1}}>${selEv.day}</span>
        </div>
        <div><div style=${{fontFamily:"Lora,serif",fontSize:px(18),fontWeight:600,color:"#3D2314"}}>${selEv.title}</div><div style=${{fontSize:px(12),color:"#9B7B62",marginTop:"2px"}}>${selEv.group}</div></div>
      </div>
      ${selEv.time&&html`<div style=${{fontSize:px(14),color:"#6B4C35",marginBottom:"6px"}}>🕐 ${selEv.time}</div>`}
      ${selEv.loc&&html`<div style=${{fontSize:px(14),color:"#6B4C35",marginBottom:"16px"}}>📍 ${selEv.loc}</div>`}
      <div style=${{background:"#FBF0D9",borderRadius:"14px",padding:"12px 14px",marginBottom:"16px"}}>
        <div style=${{fontSize:px(13),color:"#6B4C35"}}>✅ ${selEv.going+(rsvp[selEv.id]?1:0)} going · 🤔 ${selEv.maybe} maybe</div>
      </div>
      <div style=${{display:"flex",gap:"10px"}}>
        <button onClick=${()=>setRsvp(r=>({...r,[selEv.id]:!r[selEv.id]}))} style=${{flex:1,padding:"14px",borderRadius:"50px",border:"2px solid #D4922A",background:rsvp[selEv.id]?"#D4922A":"transparent",fontSize:px(14),fontWeight:700,color:rsvp[selEv.id]?"white":"#D4922A",cursor:"pointer"}}>${rsvp[selEv.id]?"✅ I'm Going!":"Yes, I'll Be There"}</button>
        <button style=${{flex:1,padding:"14px",borderRadius:"50px",border:"2px solid #D4922A",background:"transparent",fontSize:px(14),fontWeight:700,color:"#D4922A",cursor:"pointer"}}>Maybe</button>
      </div>
    </${Overlay}>`}

    <!-- COMMENTS -->
    ${cmtOpen!==null&&(()=>{
      const allP=Object.values(feed).flat();
      const pi=allP.find(x=>x.id===cmtOpen);
      const pc=pCmts(cmtOpen);
      return html`
      <div onClick=${()=>setCmtOpen(null)} style=${{position:"fixed",inset:0,background:"rgba(61,35,20,.45)",zIndex:60,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}}>
        <div onClick=${e=>e.stopPropagation()} style=${{width:"100%",maxWidth:"430px",margin:"0 auto",background:t.cb,borderRadius:"24px 24px 0 0",maxHeight:"82vh",display:"flex",flexDirection:"column",animation:"slideUp .25s ease"}}>
          <div style=${{padding:"14px 18px 12px",borderBottom:`1px solid ${t.ap}`,flexShrink:0}}>
            ${handle(t.al)}
            <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
              <div style=${{fontFamily:"Lora,serif",fontSize:px(17),fontWeight:600,color:"#3D2314"}}>Comments ${pc.length>0&&html`<span style=${{fontSize:px(13),color:"#9B7B62",fontWeight:400}}>(${pc.length})</span>`}</div>
              <button onClick=${()=>setCmtOpen(null)} style=${{background:t.ap,border:"none",borderRadius:"50px",padding:"5px 12px",fontSize:px(13),fontWeight:700,color:t.ad,cursor:"pointer"}}>Close</button>
            </div>
            ${pi&&html`<div style=${{display:"flex",alignItems:"center",gap:"8px",background:t.bg,borderRadius:"12px",padding:"8px 12px",border:`1px solid ${t.ap}`}}><span style=${{fontSize:"18px"}}>${pi.av}</span><div style=${{flex:1,minWidth:0}}><span style=${{fontSize:px(12),fontWeight:700,color:t.ad}}>${pi.name}: </span><span style=${{fontSize:px(12),color:"#6B4C35"}}>${pi.cap||pi.status||pi.title}</span></div></div>`}
          </div>
          <div class="scroll" style=${{flex:1,padding:"14px 18px"}}>
            ${pc.length===0&&html`<div style=${{textAlign:"center",padding:"32px 0",color:"#9B7B62"}}><div style=${{fontSize:"36px",marginBottom:"8px"}}>💬</div><div style=${{fontSize:px(14),fontWeight:700,color:"#6B4C35",marginBottom:"4px"}}>No comments yet</div><div style=${{fontSize:px(13)}}>Be the first to say something!</div></div>`}
            ${pc.map((c,i)=>html`
            <div style=${{display:"flex",gap:"10px",marginBottom:"16px",animation:"fadeUp .25s ease both",animationDelay:i*.05+"s"}}>
              <div style=${{width:"34px",height:"34px",borderRadius:"50%",background:t.ap,border:`2px solid ${t.al}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0,marginTop:"2px"}}>${c.av}</div>
              <div style=${{flex:1}}>
                <div style=${{background:t.bg,borderRadius:"6px 15px 15px 15px",padding:"10px 13px",display:"inline-block",maxWidth:"100%",border:`1px solid ${t.ap}`}}>
                  <div style=${{fontSize:px(12),fontWeight:800,color:t.ad,marginBottom:"3px"}}>${c.name}</div>
                  <div style=${{fontSize:px(14),color:"#3D2314",lineHeight:1.5}}>${c.text}</div>
                </div>
                <div style=${{fontSize:px(11),color:"#9B7B62",marginTop:"4px",paddingLeft:"3px"}}>${c.time}</div>
              </div>
            </div>`)}
          </div>
          <div style=${{padding:"10px 14px 26px",borderTop:`1px solid ${t.ap}`,flexShrink:0,background:t.cb}}>
            <div style=${{display:"flex",gap:"8px",alignItems:"flex-end"}}>
              <div style=${{width:"34px",height:"34px",borderRadius:"50%",background:t.ap,border:`2px solid ${t.al}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0}}>${obAv}</div>
              <div style=${{flex:1,background:t.bg,borderRadius:"20px",border:`2px solid ${t.ap}`,display:"flex",alignItems:"center",padding:"9px 13px",gap:"8px"}}>
                <input value=${cmtInput} onInput=${e=>setCmtInput(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"&&cmtInput.trim())addCmt(cmtOpen);}} placeholder="Say something warm… 🧡" style=${{flex:1,background:"none",border:"none",outline:"none",fontSize:px(14),color:"#3D2314"}}/>
                <button onClick=${()=>addCmt(cmtOpen)} disabled=${!cmtInput.trim()} style=${{width:"32px",height:"32px",borderRadius:"50%",background:cmtInput.trim()?t.a:"#D4B8A8",border:"none",color:"white",fontSize:"16px",cursor:cmtInput.trim()?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↑</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    })()}

    <!-- UPLOAD SHEET -->
    ${upOpen&&(()=>{
      const canPost=upType==="checkin"?upCi.trim().length>0:(upCap.trim().length>0||preview);
      return html`
      <div onClick=${()=>{if(upStep!==4)setUpOpen(false);}} style=${{position:"fixed",inset:0,background:"rgba(61,35,20,.5)",zIndex:70,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}}>
        <div onClick=${e=>e.stopPropagation()} style=${{width:"100%",maxWidth:"430px",margin:"0 auto",background:upStep===4?t.ad:"#FFF9F2",borderRadius:"24px 24px 0 0",animation:"slideUp .28s ease",maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>

          ${upStep===4&&html`
          <div style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 32px 64px",background:`linear-gradient(160deg,${t.ad} 0%,${t.a} 100%)`}}>
            <div style=${{width:"90px",height:"90px",borderRadius:"50%",background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"50px",marginBottom:"22px",border:"3px solid rgba(255,255,255,.4)"}}>✅</div>
            <div style=${{fontFamily:"Lora,serif",fontSize:"24px",fontWeight:600,color:"white",textAlign:"center",marginBottom:"8px"}}>${upType==="checkin"?"Check-in posted!":"Photo shared!"}</div>
            <div style=${{fontSize:"15px",color:"rgba(255,255,255,.75)",textAlign:"center"}}>Your family can see it now 🧡</div>
          </div>`}

          ${upStep===2&&upType==="photo"&&html`
          <div style=${{padding:"15px 18px 12px",borderBottom:"1px solid #F5DDD1",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick=${()=>setUpOpen(false)} style=${{background:"#F5DDD1",border:"none",borderRadius:"50px",padding:"7px 14px",fontSize:"14px",fontWeight:700,color:"#6B4226",cursor:"pointer"}}>Cancel</button>
            <div style=${{fontFamily:"Lora,serif",fontSize:"17px",fontWeight:600,color:"#C4714A"}}>Share a Photo</div>
            <div style=${{fontSize:"12px",fontWeight:700,color:"#9B7B62",background:"#F5DDD1",padding:"5px 11px",borderRadius:"50px"}}>1 of 2</div>
          </div>
          <div class="scroll" style=${{flex:1,padding:"18px 18px 0"}}>
            <div style=${{display:"flex",alignItems:"center",gap:"10px",background:t.ap,borderRadius:"12px",padding:"9px 13px",marginBottom:"16px"}}>
              <span style=${{fontSize:"18px"}}>${ag.icon}</span>
              <span style=${{fontSize:"14px",fontWeight:800,color:t.ad}}>${ag.label}</span>
            </div>
            <div onClick=${()=>fileRef.current?.click()} style=${{width:"100%",aspectRatio:"4/3",borderRadius:"20px",border:`2.5px dashed ${t.al}`,background:preview?"transparent":`linear-gradient(135deg,${t.ap},${t.sb})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",marginBottom:"16px",overflow:"hidden",position:"relative"}}>
              ${preview?html`<img src=${preview} style=${{width:"100%",height:"100%",objectFit:"cover"}}/><div style=${{position:"absolute",bottom:"10px",right:"10px",background:"rgba(0,0,0,.55)",borderRadius:"50px",padding:"5px 13px",color:"white",fontSize:"13px",fontWeight:700}}>📷 Change</div>`:html`<div class="float" style=${{fontSize:"42px",marginBottom:"8px"}}>📷</div><div style=${{fontSize:"15px",fontWeight:700,color:t.ad,marginBottom:"4px"}}>Tap to add a photo</div><div style=${{fontSize:"13px",color:"#9B7B62"}}>from your camera roll</div>`}
            </div>
            <input ref=${fileRef} type="file" accept="image/*" style=${{display:"none"}} onChange=${e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPreview(ev.target.result);r.readAsDataURL(f);}}/>
            ${!preview&&html`
            <div style=${{display:"flex",alignItems:"center",gap:"10px",marginBottom:"13px"}}><div style=${{flex:1,height:"1px",background:"#F5DDD1"}}></div><span style=${{fontSize:"13px",color:"#9B7B62",fontWeight:700}}>OR emoji</span><div style=${{flex:1,height:"1px",background:"#F5DDD1"}}></div></div>
            <div style=${{display:"flex",flexWrap:"wrap",gap:"7px",marginBottom:"18px"}}>
              ${PHOTO_EMOJIS.map(e=>html`<button onClick=${()=>setUpEmoji(e)} style=${{width:"42px",height:"42px",borderRadius:"11px",fontSize:"20px",background:upEmoji===e?t.ap:"#FFF9F2",border:`2px solid ${upEmoji===e?t.a:"rgba(107,66,38,.12)"}`,cursor:"pointer"}}>${e}</button>`)}
            </div>`}
          </div>
          <div style=${{padding:"14px 18px 30px",flexShrink:0}}>
            <button onClick=${()=>setUpStep(2.5)} style=${{width:"100%",padding:"15px",borderRadius:"50px",background:t.a,border:"none",color:"white",fontSize:"15px",fontWeight:800,cursor:"pointer"}}>Next: Add a Caption →</button>
          </div>`}

          ${upStep===2.5&&upType==="photo"&&html`
          <div style=${{padding:"15px 18px 12px",borderBottom:"1px solid #F5DDD1",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick=${()=>setUpStep(2)} style=${{background:"#F5DDD1",border:"none",borderRadius:"50px",padding:"7px 14px",fontSize:"14px",fontWeight:700,color:"#6B4226",cursor:"pointer"}}>← Back</button>
            <div style=${{fontFamily:"Lora,serif",fontSize:"17px",fontWeight:600,color:"#C4714A"}}>Add a Caption</div>
            <div style=${{fontSize:"12px",fontWeight:700,color:"#9B7B62",background:"#F5DDD1",padding:"5px 11px",borderRadius:"50px"}}>2 of 2</div>
          </div>
          <div class="scroll" style=${{flex:1,padding:"18px"}}>
            <div style=${{width:"100%",height:"140px",borderRadius:"15px",background:`linear-gradient(135deg,${t.ap},${t.sb})`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:"16px",overflow:"hidden",border:`1.5px solid ${t.ap}`}}>
              ${preview?html`<img src=${preview} style=${{width:"100%",height:"100%",objectFit:"cover"}}/>`:html`<span style=${{fontSize:"64px"}}>${upEmoji}</span>`}
            </div>
            <label style=${{fontSize:"13px",fontWeight:700,color:"#9B7B62",letterSpacing:".4px",textTransform:"uppercase",marginBottom:"8px",display:"block"}}>What would you like to say?</label>
            <textarea autoFocus value=${upCap} onInput=${e=>setUpCap(e.target.value)} placeholder="Tell your family what's going on… 🧡" rows="4"
              style=${{width:"100%",padding:"15px",borderRadius:"15px",border:`2px solid ${upCap.trim()?t.a:"#F5DDD1"}`,background:"#FAF6F0",fontSize:"16px",color:"#3D2314",outline:"none",resize:"none",lineHeight:1.6,marginBottom:"10px"}}></textarea>
            <div style=${{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              ${["Thinking of you all! 💕","Beautiful day here ☀️","Missing you guys 🥰","Just had to share this!"].map(s=>html`
              <button onClick=${()=>setUpCap(s)} style=${{padding:"7px 13px",borderRadius:"50px",fontSize:"13px",fontWeight:600,background:upCap===s?t.ap:"#FFF9F2",border:`1.5px solid ${upCap===s?t.a:"#F5DDD1"}`,color:upCap===s?t.ad:"#6B4C35",cursor:"pointer"}}>${s}</button>`)}
            </div>
          </div>
          <div style=${{padding:"14px 18px 30px",flexShrink:0}}>
            <button onClick=${submitPost} disabled=${!canPost} style=${{width:"100%",padding:"16px",borderRadius:"50px",background:canPost?t.a:"#D4B8A8",border:"none",color:"white",fontSize:"16px",fontWeight:800,cursor:canPost?"pointer":"not-allowed"}}>📸 Share with ${ag.label}</button>
          </div>`}

          ${upStep===3&&upType==="checkin"&&html`
          <div style=${{padding:"15px 18px 12px",borderBottom:"1px solid #F5DDD1",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <button onClick=${()=>setUpOpen(false)} style=${{background:"#F5DDD1",border:"none",borderRadius:"50px",padding:"7px 14px",fontSize:"14px",fontWeight:700,color:"#6B4226",cursor:"pointer"}}>Cancel</button>
            <div style=${{fontFamily:"Lora,serif",fontSize:"17px",fontWeight:600,color:"#C4714A"}}>Quick Check-in</div>
            <div style=${{width:"60px"}}></div>
          </div>
          <div class="scroll" style=${{flex:1,padding:"18px"}}>
            <div style=${{display:"flex",alignItems:"center",gap:"12px",background:t.ap,borderRadius:"15px",padding:"13px 15px",marginBottom:"18px"}}>
              <div style=${{width:"42px",height:"42px",borderRadius:"50%",background:t.al,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"21px",flexShrink:0}}>${obAv}</div>
              <div><div style=${{fontSize:"15px",fontWeight:700,color:t.ad}}>${obName||"You"}</div><div style=${{fontSize:"12px",color:t.a,marginTop:"2px"}}>→ ${ag.icon} ${ag.label}</div></div>
            </div>
            <textarea autoFocus value=${upCi} onInput=${e=>setUpCi(e.target.value)} placeholder="Let your family know how you're doing… 💬" rows="5"
              style=${{width:"100%",padding:"15px",borderRadius:"15px",border:`2px solid ${upCi.trim()?t.a:"#F5DDD1"}`,background:"#FAF6F0",fontSize:"16px",color:"#3D2314",outline:"none",resize:"none",lineHeight:1.6,marginBottom:"14px"}}></textarea>
            <div style=${{display:"flex",flexDirection:"column",gap:"8px"}}>
              ${[{i:"☀️",t:"Good morning! Starting the day with…"},{i:"💭",t:"Been thinking about everyone. Miss you all!"},{i:"🎉",t:"Good news — "},{i:"🌧️",t:"Having a quiet day. Anyone want to video call?"}].map(p=>html`
              <button onClick=${()=>setUpCi(p.t)} style=${{display:"flex",alignItems:"center",gap:"10px",padding:"11px 13px",borderRadius:"13px",textAlign:"left",background:upCi===p.t?t.ap:"#FFF9F2",border:`1.5px solid ${upCi===p.t?t.a:"#F5DDD1"}`,cursor:"pointer"}}>
                <span style=${{fontSize:"18px",flexShrink:0}}>${p.i}</span>
                <span style=${{fontSize:"13px",color:"#6B4C35",fontWeight:600}}>${p.t}</span>
              </button>`)}
            </div>
          </div>
          <div style=${{padding:"14px 18px 30px",flexShrink:0}}>
            <button onClick=${submitPost} disabled=${!canPost} style=${{width:"100%",padding:"16px",borderRadius:"50px",background:canPost?t.a:"#D4B8A8",border:"none",color:"white",fontSize:"16px",fontWeight:800,cursor:canPost?"pointer":"not-allowed"}}>📍 Post Check-in</button>
          </div>`}
        </div>
      </div>`;
    })()}

  </div>`;
}

render(h(App,null), document.getElementById('app'));
</script>
</body>
</html>
