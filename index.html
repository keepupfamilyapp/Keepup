<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#FAF6F0;font-family:Nunito,sans-serif;overflow:hidden;}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;overflow:hidden;}
.scr{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;flex:1;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}
/* floating nav - no bottom bar */
.card{background:#FFF9F2;border-radius:16px;overflow:hidden;margin-bottom:10px;border:1px solid #F5DDD1;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;border:2px solid rgba(107,66,38,.12);background:#FAF6F0;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;}
.pill.active{background:#F5DDD1;border-color:#C4714A;color:#6B4226;}
.overlay{position:fixed;inset:0;background:rgba(61,35,20,.45);z-index:60;display:flex;align-items:flex-end;}
.sheet{width:100%;background:#FFF9F2;border-radius:24px 24px 0 0;padding:20px 18px 36px;max-height:88vh;overflow-y:auto;}
.handle{width:44px;height:5px;border-radius:5px;background:#C9A882;margin:0 auto 16px;opacity:.35;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
button{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
img{-webkit-touch-callout:none;-webkit-user-select:none;}
.no-select{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.ob-screen{position:fixed;inset:0;background:#FAF6F0;display:flex;flex-direction:column;z-index:100;}
.ob-hero{flex:0 0 42%;background:linear-gradient(170deg,#F5DDD1,#FAF0E6 60%,#E8F2E9);display:flex;align-items:center;justify-content:center;}
.ob-body{flex:1;display:flex;flex-direction:column;padding:24px 26px 32px;animation:fadeUp .4s ease both;}
.ob-title{font-family:Lora,serif;font-size:24px;font-weight:600;color:#3D2314;margin-bottom:8px;}
.ob-sub{font-size:14px;color:#9B7B62;line-height:1.6;margin-bottom:20px;}
.ob-input{padding:14px 16px;border-radius:14px;border:2px solid #E8956D;background:#FFF9F2;font-size:17px;color:#3D2314;outline:none;width:100%;font-family:inherit;margin-bottom:12px;}
.ob-input:focus{border-color:#C4714A;}
.ob-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.ob-emoji-btn{aspect-ratio:1;border-radius:13px;background:#FFF9F2;border:2px solid rgba(107,66,38,.12);font-size:26px;cursor:pointer;font-family:inherit;}
.ob-emoji-btn.sel{background:#F5DDD1;border-color:#C4714A;}
.ob-spacer{flex:1;}
.ob-dots{display:flex;justify-content:center;gap:5px;padding:16px 0 0;}
.ob-dot{height:7px;border-radius:7px;background:#E8C4A8;transition:all .3s;}
.ob-dot.active{width:24px;background:#C4714A;}
.ob-dot.inactive{width:7px;}
</style>

// Register service worker and request notification permission
function initNotifications(){
  if(!messaging||!("serviceWorker" in navigator)||typeof Notification==="undefined")return;
  navigator.serviceWorker.register("/Keepup/firebase-messaging-sw.js")
    .then(function(reg){
      console.log("SW registered");
      return messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
    })
    .then(function(token){
      if(token){
        // Save token - use currentUser.uid for reliability
        var uid=currentUser?currentUser.uid:localStorage.getItem("ku_uid");
        if(uid){
          var groupIds=ST.groups.map(function(g){return g.id;});
          db.collection("fcmTokens").doc(uid).set({
            token:token,uid:uid,name:ST.name,
            groupIds:groupIds,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          }).catch(function(e){console.log("token save failed",e);});
        }
        console.log("FCM token saved");
      }
    })
    .catch(function(e){console.log("Notification setup failed:",e);});

  // Handle foreground messages
  if(messaging){messaging.onMessage(function(payload){
    var title=payload.notification&&payload.notification.title||"Keep Up";
    var body=payload.notification&&payload.notification.body||"New activity in your family";
    showInAppNotif(title,body);
  });}
}

function showInAppNotif(title,body){
  var banner=document.createElement("div");
  banner.style.cssText="position:fixed;top:12px;left:12px;right:12px;background:#3D2314;color:white;padding:12px 16px;border-radius:14px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:Nunito,sans-serif;animation:slideDown .3s ease;";
  banner.innerHTML="<div style='font-size:13px;font-weight:800;margin-bottom:2px'>"+title+"</div><div style='font-size:12px;opacity:.8'>"+body+"</div>";
  document.body.appendChild(banner);
  setTimeout(function(){banner.remove();},4000);
}

// Send notification to all group members via Firestore trigger
// (We store a "notification" doc that a Cloud Function would pick up,
//  but for now we use Firestore to broadcast to other open tabs)
function uploadPhoto(dataUrl){
  return new Promise(function(resolve,reject){
    if(!dataUrl||!dataUrl.startsWith("data:"))return resolve(dataUrl);
    var uid=(currentUser&&currentUser.uid)||localStorage.getItem("ku_uid")||"anon";
    var isVid=ST.upIsVideo&&ST.upVideoFile;
    if(isVid){
      var ext=ST.upVideoFile.name.split(".").pop()||"mp4";
      var ref=storage.ref("videos/"+uid+"/"+Date.now()+"."+ext);
      ref.put(ST.upVideoFile)
        .then(function(snap){return snap.ref.getDownloadURL();})
        .then(function(url){resolve(url);})
        .catch(function(e){console.log("Video upload failed",e);resolve(null);});
    } else {
      var ref=storage.ref("photos/"+uid+"/"+Date.now()+".jpg");
      ref.putString(dataUrl,"data_url",{contentType:"image/jpeg"})
        .then(function(snap){return snap.ref.getDownloadURL();})
        .then(function(url){resolve(url);})
        .catch(function(e){console.log("Storage upload failed",e);resolve(dataUrl);});
    }
  });
}

function broadcastNotif(title,body,groupId){
  var uid=currentUser?currentUser.uid:(localStorage.getItem("ku_uid")||"anon");
  db.collection("notifications").add({
    title:title,body:body,groupId:groupId,senderUid:uid,
    sentAt:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(e){});
}

function fetchAllFeeds(){
  if(!currentUser)return;
  ST.feedLoading=true;
  if(ST.tab==="feed")redraw();
  var gid=ST.group||"imm";
  db.collection("feed").where("groupId","==",gid).get()
    .then(function(snap){
      ST.feed[gid]=[];
      snap.forEach(function(doc){ST.feed[gid].push(Object.assign({},doc.data(),{id:doc.id}));});
      ST.feed[gid].sort(function(a,b){
        var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;
        var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;
        return tb-ta;
      });
      ST.feedLoading=false;
      if(ST.tab==="feed")redraw();
    }).catch(function(e){
      console.log("fetchAllFeeds error:",e.code,e.message);
      ST.feedLoading=false;
      if(ST.tab==="feed")redraw();
    });
}

function syncOn(){
  if(!currentUser)return;
  unsubscribers.forEach(function(u){u();});unsubscribers=[];
  var dot=document.getElementById("sync-dot");if(dot)dot.style.display="block";
  doSync();
}
function doSync(){

  // Fetch feed for all groups
  function fetchFeed(gid){
    db.collection("feed").where("groupId","==",gid).get()
      .then(function(snap){
        ST.feed[gid]=[];
        snap.forEach(function(doc){
          ST.feed[gid].push(Object.assign({},doc.data(),{id:doc.id}));
        });
        ST.feed[gid].sort(function(a,b){
          var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;
          var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;
          return tb-ta;
        });
        if(ST.tab==="feed")redraw();
      }).catch(function(e){console.log("fetchFeed error:",e);});
  }
  ST.groups.forEach(function(g){fetchFeed(g.id);});

  // Also set up real-time listener for new posts
  function watchFeed(gid){
    var unsub=db.collection("feed").where("groupId","==",gid)
      .onSnapshot(function(snap){
        ST.feed[gid]=ST.feed[gid]||[];
        snap.forEach(function(doc){
          var data=Object.assign({},doc.data(),{id:doc.id});
          var existing=ST.feed[gid].findIndex(function(x){return x.id===data.id;});
          if(existing>=0)ST.feed[gid][existing]=data;
          else ST.feed[gid].push(data);
        });
        ST.feed[gid].sort(function(a,b){
          var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;
          var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;
          return tb-ta;
        });
        if(ST.tab==="feed")redraw();
      },function(err){console.log("watchFeed error:",err);});
    unsubscribers.push(unsub);
  }
  ST.groups.forEach(function(g){watchFeed(g.id);});

  // Listen to chat messages for current group
  function watchChat(gid){
    var unsub=db.collection("chat").where("groupId","==",gid)
      .onSnapshot(function(snap){
        if(!ST.chatMsgs[gid])ST.chatMsgs[gid]=[];
        snap.docChanges().forEach(function(change){
          var data=Object.assign({},change.doc.data(),{id:change.doc.id});
          if(change.type==="added"||change.type==="modified"){
            data.you=(data.name===(ST.name||"You")&&data.av===ST.avatar);
            // Remove matching optimistic temp message
            if(data.imgUrl&&data.you){ST.chatMsgs[gid]=ST.chatMsgs[gid].filter(function(x){return !x.uploading;});}
            else if(!data.imgUrl){ST.chatMsgs[gid]=ST.chatMsgs[gid].filter(function(x){return !x.id.startsWith("tmp-")||x.text!==data.text;});}
            var cidx=ST.chatMsgs[gid].findIndex(function(x){return x.id===data.id;});
            if(cidx>=0)ST.chatMsgs[gid][cidx]=data;
            else ST.chatMsgs[gid].push(data);
          }
          if(change.type==="removed"){ST.chatMsgs[gid]=ST.chatMsgs[gid].filter(function(x){return x.id!==data.id;});}
        });
        // Sort by time
        ST.chatMsgs[gid].sort(function(a,b){
          var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;
          var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;
          return ta-tb;
        });
        if(ST.tab==="chat"){
            if(ST.openChat===dmId&&document.activeElement&&document.activeElement.tagName==="INPUT"){
              // Input focused - just scroll, queue redraw for when they stop typing
              setTimeout(function(){var els=document.querySelectorAll(".scr");els.forEach(function(l){l.scrollTop=l.scrollHeight;});},50);
            }else{redraw();}
          }
      });
    unsubscribers.push(unsub);
  }
  ST.groups.forEach(function(g){watchChat(g.id);});

  // Listen to DM messages
  function watchDm(dmId){
    // Listen to seenBy field on the DM meta doc
    var seenUnsub=db.collection("userDms").doc(dmId)
      .onSnapshot(function(doc){
        if(!doc.exists)return;
        var dm=ST.dms.find(function(x){return x.id===dmId;});
        if(!dm)return;
        var data=doc.data();
        dm.seenBy=data.seenBy||{};
        if(ST.tab==="chat"&&ST.openChat===dmId)redraw();
      },function(){});
    unsubscribers.push(seenUnsub);
    var unsub=db.collection("dms").doc(dmId).collection("msgs")
      .onSnapshot(function(snap){
        var dm=ST.dms.find(function(x){return x.id===dmId;});
        if(!dm)return;
        snap.docChanges().forEach(function(change){
          var data=Object.assign({},change.doc.data(),{id:change.doc.id});
          if(change.type==="added"){
            // Clean up temp/uploading placeholders that match this incoming message
            var myUid3=currentUser?currentUser.uid:localStorage.getItem("ku_uid");
            var isMine=(data.av===ST.avatar&&data.name===(ST.name||"You"));
            if(data.imgUrl&&isMine){dm.msgs=dm.msgs.filter(function(x){return !x.uploading;});}
            else if(!data.imgUrl){dm.msgs=dm.msgs.filter(function(x){return !(x.id&&x.id.startsWith("tmp-")&&x.text===data.text);});}
            if(!dm.msgs.find(function(x){return x.id===data.id;})){
              data.you=(data.name===(ST.name||"You")&&data.av===ST.avatar);
              dm.msgs.push(data);dm.last=data.text||"📷";dm.lt="Just now";
              if(!data.you&&ST.openChat!==dmId){dm.unread=(dm.unread||0)+1;}
            }
          }
        });
        if(ST.tab==="chat")redraw();
      });
    unsubscribers.push(unsub);
  }
  // Listen for DMs in real-time so new DMs from others appear without refresh
  var uid=currentUser?currentUser.uid:localStorage.getItem("ku_uid");
  if(uid){
    var dmListUnsub=db.collection("userDms").where("members","array-contains",uid)
      .onSnapshot(function(snap){
        snap.docChanges().forEach(function(change){
          var data=change.doc.data();
          var dmId=change.doc.id;
          var myUid2=currentUser?currentUser.uid:localStorage.getItem("ku_uid");
          var otherProfiles=(data.memberProfiles||[]).filter(function(p){
            var safeAv=(p.av&&p.av.length<=8)?p.av:"\uD83D\uDC64";
            var safeName=(p.name&&p.name.length<40&&!/^[A-Za-z0-9_-]{20,}$/.test(p.name))?p.name:"Family member";
            p.av=safeAv;p.name=safeName;
            return p.uid!==myUid2;
          });
          if(!otherProfiles.length)otherProfiles=data.memberProfiles||[];
          if(change.type==="added"){
            // New DM appeared (either we created it or someone DMed us)
            if(!ST.dms.find(function(x){return x.id===dmId;})){
              ST.dms.push({id:dmId,members:otherProfiles,last:data.last||"",lt:data.lt||"",msgs:[]});
            }
            watchDm(dmId);
          } else if(change.type==="modified"){
            // Update last message preview
            var existing=ST.dms.find(function(x){return x.id===dmId;});
            if(existing){existing.last=data.last||"";existing.lt=data.lt||"";}
          }
        });
        if(ST.tab==="chat"&&(!document.activeElement||document.activeElement.tagName!=="INPUT"))redraw();
      },function(e){console.log("userDms listener failed",e);});
    unsubscribers.push(dmListUnsub);
  }

  // Listen for notifications triggered by other users
  var notifUnsub=db.collection("notifications")
    .orderBy("sentAt","desc").limit(1)
    .onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        if(change.type==="added"){
          var n=change.doc.data();
          // Don't show if we sent it ourselves
          var myUid=currentUser?currentUser.uid:(localStorage.getItem("ku_uid")||"anon");
          if(n.senderUid&&n.senderUid===myUid)return;
          var age=n.sentAt?Date.now()-n.sentAt.toMillis():9999;
          if(age>3000&&age<30000){
            // Show browser notification if permission granted
            if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
              new Notification(n.title||"Keep Up",{
                body:n.body||"New activity in your family",
                icon:"/Keepup/icon.svg"
              });
            }
            showInAppNotif(n.title||"Keep Up",n.body||"New activity");
          }
        }
      });
    });
  unsubscribers.push(notifUnsub);

  // Listen to members
  var memUnsub=db.collection("members").onSnapshot(function(snap){
    ST.fbMembers=ST.fbMembers||{};
    snap.forEach(function(doc){
      var m=doc.data();
      var gid=m.groupId||"imm";
      if(!ST.fbMembers[gid])ST.fbMembers[gid]=[];
      if(!ST.fbMembers[gid].find(function(x){return x.uid===m.uid;})){
        var safeAv=(m.av&&m.av.length<=8)?m.av:"\uD83D\uDC64";
        var safeName=(m.name&&m.name.length<40&&!/^[A-Za-z0-9_-]{20,}$/.test(m.name))?m.name:"Family member";
        ST.fbMembers[gid].push(Object.assign({},m,{av:safeAv,name:safeName}));
      }
    });
    if(ST.tab==="profile")redraw();
  });
  unsubscribers.push(memUnsub);

  // Listen to comments
  var cmtUnsub=db.collection("comments").onSnapshot(function(snap){
    // Rebuild all comments from scratch on each snapshot to avoid dupes
    ST.comments={};
    snap.forEach(function(doc){
      var data=Object.assign({},doc.data(),{id:doc.id});
      var pid=data.postId;if(!pid)return;
      if(!ST.comments[pid])ST.comments[pid]=[];
      ST.comments[pid].push(data);
    });
    // Sort each post's comments by createdAt
    Object.keys(ST.comments).forEach(function(pid){
      ST.comments[pid].sort(function(a,b){
        var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;
        var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;
        return ta-tb;
      });
    });
    if(ST.cmtOpen!==null)redraw();
  });
  unsubscribers.push(cmtUnsub);

  // Listen to RSVPs
  var rsvpUnsub=db.collection("rsvps").onSnapshot(function(snap){
    snap.forEach(function(doc){
      var r=doc.data();
      if(r.evId)ST.rsvp[r.evId]=r.going;
    });
  });
  unsubscribers.push(rsvpUnsub);

  // Listen to events
  var evUnsub=db.collection("events")
    .onSnapshot(function(snap){
      snap.docChanges().forEach(function(change){
        var data=Object.assign({},change.doc.data(),{id:change.doc.id});
        if(change.type==="added"&&!ST.evs.find(function(x){return x.id===data.id;})){
          ST.evs.push(data);
        }
        if(change.type==="removed"){ST.evs=ST.evs.filter(function(x){return x.id!==data.id;});}
      });
      if(ST.tab==="calendar")redraw();
    });
  unsubscribers.push(evUnsub);
} // end doSync

function postToFeed(item){
  if(!currentUser)return Promise.reject(new Error("Not authenticated"));
  return db.collection("feed").add(Object.assign({},item,{
    senderUid:currentUser.uid,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }));
}

function postToChat(gid,msg){
  if(!currentUser)return Promise.reject(new Error("Not authenticated"));
  return db.collection("chat").add(Object.assign({},msg,{
    groupId:gid,createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }));
}

function postToDm(dmId,msg){
  return db.collection("dms").doc(dmId).collection("msgs").add(Object.assign({},msg,{
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }));
}

function postEvent(ev){
  return db.collection("events").add(Object.assign({},ev,{
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }));
}

var TH={
  imm:{a:"#C4714A",al:"#E8956D",ap:"#F5DDD1",ad:"#6B4226",bg:"#FAF6F0",cb:"#FFF9F2",sb:"#FFF3E8"},

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs){
    if(attrs.cls){e.className=attrs.cls;delete attrs.cls;}
    if(attrs.css){Object.assign(e.style,attrs.css);delete attrs.css;}
    if(attrs.html){e.innerHTML=attrs.html;delete attrs.html;}
    Object.keys(attrs).forEach(function(k){
      if(k==="value")e.value=attrs[k];
      else if(k==="disabled"&&attrs[k])e.setAttribute("disabled","");
      else if(k==="rows")e.rows=attrs[k];
      else if(k==="placeholder")e.placeholder=attrs[k];
      else if(k==="type")e.type=attrs[k];
      else if(k==="accept")e.accept=attrs[k];
      else e.setAttribute(k,attrs[k]);
    });
  }
  if(children){var ch=Array.isArray(children)?children:[children];ch.forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});}
  return e;
}

function showFullScreen(url){
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;overflow:hidden;touch-action:none;";
  var wrapper=document.createElement("div");
  wrapper.style.cssText="width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;";
  var img=document.createElement("img");
  img.src=url;
  img.style.cssText="max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;transition:transform .1s ease;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;";
  img.addEventListener("contextmenu",function(e){e.preventDefault();});
  wrapper.appendChild(img);ov.appendChild(wrapper);

  // Pinch to zoom
  var scale=1,lastScale=1,startDist=0;
  var panX=0,panY=0,lastPanX=0,lastPanY=0;
  var startX1=0,startY1=0,startX2=0,startY2=0;
  var touching=0;

  function applyTransform(){
    img.style.transform="translate("+panX+"px,"+panY+"px) scale("+scale+")";
  }

  ov.addEventListener("touchstart",function(e){
    touching=e.touches.length;
    if(touching===2){
      startDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      lastScale=scale;
      startX1=e.touches[0].clientX;startY1=e.touches[0].clientY;
      startX2=e.touches[1].clientX;startY2=e.touches[1].clientY;
    } else if(touching===1){
      lastPanX=panX;lastPanY=panY;
      startX1=e.touches[0].clientX;startY1=e.touches[0].clientY;
    }
  },{passive:true});

  ov.addEventListener("touchmove",function(e){
    e.preventDefault();
    if(e.touches.length===2){
      var dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      scale=Math.min(5,Math.max(1,lastScale*(dist/startDist)));
      applyTransform();
    } else if(e.touches.length===1&&scale>1){
      panX=lastPanX+(e.touches[0].clientX-startX1);
      panY=lastPanY+(e.touches[0].clientY-startY1);
      applyTransform();
    }
  },{passive:false});

  ov.addEventListener("touchend",function(e){
    touching=e.touches.length;
    if(scale<1.05){scale=1;panX=0;panY=0;applyTransform();}
    // Double tap to zoom
    if(e.changedTouches.length===1&&scale===1){
      var now=Date.now();
      if(ov._lastTap&&now-ov._lastTap<300){
        scale=2.5;applyTransform();
      } else {
        ov._lastTap=now;
      }
    } else if(e.changedTouches.length===1&&scale>1&&e.touches.length===0){
      // Double tap to reset
      var now=Date.now();
      if(ov._lastTap&&now-ov._lastTap<300){
        scale=1;panX=0;panY=0;applyTransform();
      } else {
        ov._lastTap=now;
      }
    }
  },{passive:true});

  // Close button
  var closeBtn=document.createElement("button");
  closeBtn.textContent="\u2715";
  closeBtn.style.cssText="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:white;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;font-family:inherit;z-index:201;-webkit-user-select:none;";
  closeBtn.onclick=function(){ov.remove();};
  ov.appendChild(closeBtn);

  // Tap background to close (only when not zoomed)
  wrapper.addEventListener("click",function(e){if(scale<=1&&e.target===wrapper)ov.remove();});

  document.body.appendChild(ov);
}

function timeAgo(ts){
  if(!ts)return"Just now";
  var ms=ts.toMillis?ts.toMillis():typeof ts==="number"?ts:Date.now();
  var diff=Math.floor((Date.now()-ms)/1000);
  if(diff<10)return"Just now";
  if(diff<60)return diff+"s ago";
  if(diff<3600)return Math.floor(diff/60)+"m ago";
  if(diff<86400)return Math.floor(diff/3600)+"h ago";
  if(diff<604800)return Math.floor(diff/86400)+"d ago";
  var d=new Date(ms);return(d.getMonth()+1)+"/"+d.getDate();
}

function injectBirthdays(){
  if(!ST.birthdays||!ST.birthdays.length)return;
  var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  ST.birthdays.forEach(function(bk){
    var bdate=new Date(now.getFullYear(),bk.month-1,bk.day);
    if(bdate<today)bdate=new Date(now.getFullYear()+1,bk.month-1,bk.day);
    var diff=Math.round((bdate-today)/(1000*60*60*24));
    if(diff>7)return;
    var gid=bk.groupId;
    if(!ST.feed[gid])ST.feed[gid]=[];
    ST.feed[gid]=ST.feed[gid].filter(function(item){return item.bdayId!==bk.id;});
    ST.feed[gid].unshift({id:"bday-"+bk.id,type:"birthday",bdayId:bk.id,av:bk.av,name:bk.name,groupId:gid,daysAway:diff});
  });
}

function sendChatPhoto(gid,file,t){
  if(!currentUser){alert("Still signing you in, try again in a moment.");return;}
  var dm=ST.dms&&ST.dms.find(function(x){return x.id===gid;});
  var tempId="chatphoto-"+Date.now();
  var tempMsg={id:tempId,av:ST.avatar,name:ST.name||"You",text:"",imgUrl:null,uploading:true,time:"Just now",you:true};
  if(dm){dm.msgs.push(tempMsg);}
  else{if(!ST.chatMsgs[gid])ST.chatMsgs[gid]=[];ST.chatMsgs[gid].push(tempMsg);}
  redraw();
  setTimeout(function(){var els=document.querySelectorAll(".scr");els.forEach(function(l){l.scrollTop=l.scrollHeight;});},50);
  var uid=currentUser.uid;
  var ext=file.name.split(".").pop()||"jpg";
  storage.ref("chat-photos/"+uid+"/"+Date.now()+"."+ext).put(file)
    .then(function(snap){return snap.ref.getDownloadURL();})
    .then(function(url){
      var msg={av:ST.avatar,name:ST.name||"You",text:"",imgUrl:url,time:"Just now",you:true};
      // Remove temp
      if(dm){dm.msgs=dm.msgs.filter(function(x){return x.id!==tempId;});}
      else{ST.chatMsgs[gid]=ST.chatMsgs[gid].filter(function(x){return x.id!==tempId;});}
      if(dm){
        postToDm(gid,Object.assign({},msg,{you:false})).catch(function(){
          dm.msgs.push(Object.assign({},msg,{id:Date.now()}));dm.last="📷 Photo";dm.lt="Just now";
        });
      } else {
        postToChat(gid,Object.assign({},msg,{you:false})).catch(function(){
          if(!ST.chatMsgs[gid])ST.chatMsgs[gid]=[];
          ST.chatMsgs[gid].push(Object.assign({},msg,{id:Date.now()}));
        });
      }
      // No broadcastNotif for DM photos - keep DMs private
      redraw();
      setTimeout(function(){var els=document.querySelectorAll(".scr");els.forEach(function(l){l.scrollTop=l.scrollHeight;});},80);
    }).catch(function(e){
      console.log("chat photo upload failed",e);
      if(dm){dm.msgs=dm.msgs.filter(function(x){return x.id!==tempId;});}
      else{ST.chatMsgs[gid]=ST.chatMsgs[gid].filter(function(x){return x.id!==tempId;});}
      redraw();
      alert("Photo failed to send. Check your connection.");
    });
}

function sendChat(gid){
  var iv=ST.chatIn[gid]||"";if(!iv.trim())return;
  var sUid=currentUser?currentUser.uid:(localStorage.getItem("ku_uid")||"anon");
  var msg={av:ST.avatar,name:ST.name||"You",text:iv.trim(),time:"Just now",you:true,senderUid:sUid};
  ST.chatIn[gid]="";
  var dm=ST.dms&&ST.dms.find(function(x){return x.id===gid;});
  // Optimistic: show message immediately before Firestore confirms
  if(dm){
    dm.msgs.push(Object.assign({},msg,{id:"tmp-"+Date.now()}));
    dm.last=msg.text;dm.lt="Just now";
  } else {
    if(!ST.chatMsgs[gid])ST.chatMsgs[gid]=[];
    ST.chatMsgs[gid].push(Object.assign({},msg,{id:"tmp-"+Date.now()}));
  }
  redraw();
  setTimeout(function(){var els=document.querySelectorAll(".scr");els.forEach(function(l){l.scrollTop=l.scrollHeight;});},50);
  if(dm){
    postToDm(gid,Object.assign({},msg,{you:false})).then(function(){
      // Update last message in Firestore - no broadcastNotif for DMs (private)
      db.collection("userDms").doc(gid).update({
        last:msg.text,lt:"Just now",
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      }).catch(function(){});
    }).catch(function(e){console.log("DM send failed",e);});
  } else {
    postToChat(gid,Object.assign({},msg,{you:false})).catch(function(e){console.log("chat send failed",e);});
  }
}

    row.addEventListener("click",function(){var key=mem.av+mem.name;if(ST.dmSel.includes(key))ST.dmSel=ST.dmSel.filter(function(x){return x!==key;});else ST.dmSel.push(key);redraw();});sh.appendChild(row);
  });
  var sub=b({css:{width:"100%",padding:"14px",borderRadius:"50px",background:ST.dmSel.length?t.a:"#D4B8A8",border:"none",color:"white",fontSize:"15px",fontWeight:800,cursor:ST.dmSel.length?"pointer":"not-allowed",fontFamily:"inherit",marginTop:"8px"}},ST.dmSel.length?"Start Chat":"Select someone first");
  sub.addEventListener("click",function(){
    if(!ST.dmSel.length)return;
    // Use fbMems if available (real Firebase members), fall back to local
    var fbMemsAll=((ST.fbMembers&&ST.fbMembers[ST.dmGrp])||[]).filter(function(m){return m.uid!==uid;});
    var selMems;
    if(fbMemsAll.length){
      selMems=fbMemsAll
        .filter(function(m){return ST.dmSel.includes((m.av||"\u{1F464}")+(m.name||"Member"));})
        .map(function(m){return{av:m.av||"\u{1F464}",name:m.name||"Member",uid:m.uid};});
    } else {
      selMems=(ST.mems[ST.dmGrp]||[]).filter(function(m){return ST.dmSel.includes(m.av+m.name);});
    }
    if(!selMems.length)selMems=[{av:"\uD83D\uDC64",name:"Family member"}];
    var nid="dm-"+Date.now();if(!ST.dms)ST.dms=[];
    ST.dms.unshift({id:nid,members:selMems,last:"",lt:"Now",msgs:[]});
    // Save DM metadata to Firestore so it persists across sessions
    var memberUids=selMems.map(function(m){return m.uid||"anon";});
    if(uid&&!memberUids.includes(uid))memberUids.push(uid);
    var senderUid2=(currentUser?currentUser.uid:null)||uid||"anon";
    var senderProfile={av:ST.avatar,name:ST.name||"You",uid:senderUid2};
    var allProfiles=selMems.concat([senderProfile]);
    if(!memberUids.includes(senderUid2))memberUids.push(senderUid2);
    db.collection("userDms").doc(nid).set({
      id:nid,
      members:memberUids,
      memberProfiles:allProfiles,
      createdBy:senderUid2,
      last:"",lt:"",
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){console.log("DM meta save failed",e);});
    // Start listening to this new DM immediately so messages appear in real time
    (function(dmId){
      var unsub=db.collection("dms").doc(dmId).collection("msgs")
        .onSnapshot(function(snap){
          var dm=ST.dms.find(function(x){return x.id===dmId;});
          if(!dm)return;
          snap.docChanges().forEach(function(change){
            var data=Object.assign({},change.doc.data(),{id:change.doc.id});
            if(change.type==="added"){
              // Remove any matching optimistic temp message first
              dm.msgs=dm.msgs.filter(function(x){return !x.id.startsWith("tmp-")||x.text!==data.text;});
              if(!dm.msgs.find(function(x){return x.id===data.id;})){
                data.you=(data.name===(ST.name||"You")&&data.av===ST.avatar);
                dm.msgs.push(data);dm.last=data.text||"📷";dm.lt="Just now";
              }
            }
          });
          if(ST.tab==="chat")redraw();
        });
      unsubscribers.push(unsub);
    })(nid);
    ST.dmSel=[];ST.newDm=false;ST.openChat=nid;redraw();
  });sh.appendChild(sub);ov.appendChild(sh);return ov;
}

function fallbackCopy(text,btn,origColor){
  var ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px;top:-9999px;";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");btn.textContent="\u2713 Copied!";btn.style.background="#4A7C59";setTimeout(function(){btn.textContent="Copy Link";if(origColor)btn.style.background=origColor;},2500);}
  catch(e){btn.textContent="Long-press to copy";setTimeout(function(){btn.textContent="Copy Link";},3000);}
  document.body.removeChild(ta);
}

function submitPost(){
  // Capture state before clearing
  var imgData=ST.upImg;
  var vidFile=ST.upVideoFile;
  var isVid=ST.upIsVideo;
  var postType=ST.upType;
  var postStatus=ST.upCi;
  var postCap=ST.upCap;
  var postGroup=ST.group;
  var postName=ST.name||"You";
  var postAv=ST.avatar;

  if(postType==="checkin"&&!postStatus.trim())return;

  // Close sheet immediately
  ST.upOpen=false;ST.upStep=1;ST.upCi="";ST.upCap="";
ST.upImg=null;
  redraw();

  var p;
  if(postType==="checkin"){
    p={type:"checkin",av:postAv,name:postName,time:"Just now",status:postStatus,groupId:postGroup};
    postToFeed(p).then(function(){
      broadcastNotif(postName+" checked in",postStatus.substring(0,60),postGroup);
      // Refresh feed after posting
      db.collection("feed").where("groupId","==",postGroup).get().then(function(snap){
        ST.feed[postGroup]=[];
        snap.forEach(function(doc){ST.feed[postGroup].push(Object.assign({},doc.data(),{id:doc.id}));});
        ST.feed[postGroup].sort(function(a,b){var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;return tb-ta;});
        redraw();
      });
    }).catch(function(e){console.log("checkin post failed",e);});
  } else {
    p={type:isVid?"video":"photo",isVideo:isVid,av:postAv,name:postName,time:"Just now",emoji:"\uD83C\uDF3B",imgUrl:null,cap:postCap,groupId:postGroup};
    // Must have real Firebase auth uid for Storage
    if(!currentUser){
      var errB=document.createElement("div");
      errB.style.cssText="position:fixed;top:60px;left:12px;right:12px;background:#C0392B;color:white;padding:12px 16px;border-radius:14px;z-index:999;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;";
      errB.textContent="Please wait a moment and try again — still signing you in.";
      document.body.appendChild(errB);setTimeout(function(){errB.remove();},4000);
      return;
    }
    var uid=currentUser.uid;
    // Convert base64 to blob for reliable mobile upload
    function dataUrlToBlob(dataUrl){
      var arr=dataUrl.split(",");var mime=arr[0].match(/:(.*?);/)[1];
      var bstr=atob(arr[1]);var n=bstr.length;var u8=new Uint8Array(n);
      while(n--){u8[n]=bstr.charCodeAt(n);}
      return new Blob([u8],{type:mime});
    }
    var uploadRef=isVid&&vidFile
      ? storage.ref("videos/"+uid+"/"+Date.now()+"."+(vidFile.name.split(".").pop()||"mp4")).put(vidFile).then(function(s){return s.ref.getDownloadURL();})
      : storage.ref("photos/"+uid+"/"+Date.now()+".jpg").put(dataUrlToBlob(imgData)).then(function(s){return s.ref.getDownloadURL();});
    // Show uploading indicator in feed
    var tempId="temp-"+Date.now();
    var tempPost={id:tempId,type:"photo",av:postAv,name:postName,time:"Just now",cap:postCap,groupId:postGroup,emoji:"\uD83D\uDCF7",uploading:true};
    if(!ST.feed[postGroup])ST.feed[postGroup]=[];
    ST.feed[postGroup].unshift(tempPost);
    redraw();

    uploadRef.then(function(url){
      // Remove temp post
      ST.feed[postGroup]=ST.feed[postGroup].filter(function(x){return x.id!==tempId;});
      p.imgUrl=url;
      return postToFeed(p);
    }).then(function(){
      broadcastNotif(postName+" posted","Shared a photo",postGroup);
      // Refresh feed
      db.collection("feed").where("groupId","==",postGroup).get().then(function(snap){
        ST.feed[postGroup]=[];
        snap.forEach(function(doc){ST.feed[postGroup].push(Object.assign({},doc.data(),{id:doc.id}));});
        ST.feed[postGroup].sort(function(a,b){var ta=a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0;var tb=b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0;return tb-ta;});
        redraw();
      });
    }).catch(function(e){
      console.log("photo post failed:",e.message||e);
      // Remove temp, post without image
      ST.feed[postGroup]=ST.feed[postGroup].filter(function(x){return x.id!==tempId;});
      p.imgUrl=null;
      postToFeed(p).then(function(){
        db.collection("feed").where("groupId","==",postGroup).get().then(function(snap){
          ST.feed[postGroup]=[];
          snap.forEach(function(doc){ST.feed[postGroup].push(Object.assign({},doc.data(),{id:doc.id}));});
          redraw();
        });
      });
      // Show error
      var errBanner=document.createElement("div");
      errBanner.style.cssText="position:fixed;top:60px;left:12px;right:12px;background:#C0392B;color:white;padding:12px 16px;border-radius:14px;z-index:999;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;";
      errBanner.textContent="Photo upload failed: "+((e&&e.message)||"Storage error. Check your connection.");
      document.body.appendChild(errBanner);
      setTimeout(function(){errBanner.remove();},5000);
    });
  }
}

// Check for invite link ?join=GroupName&icon=emoji
// Store pending invite token to process after page loads
var _pendingToken=null;
(function(){
  var params=new URLSearchParams(window.location.search);
  var token=params.get("token");
  var joinGroup=params.get("join");
  var joinIcon=params.get("icon");
  if(token){
    _pendingToken=token;
    window.history.replaceState({},"",window.location.pathname);
  } else if(joinGroup){
    ST.obGrpName=joinGroup;
    if(joinIcon)ST.obGrpEmoji=joinIcon;
    ST.joinInvite=true;
    window.history.replaceState({},"",window.location.pathname);
  }
})();

function processInviteToken(token){
  db.collection("inviteTokens").doc(token).get().then(function(doc){
    if(!doc.exists){
      alert("This invite link is invalid. Please ask for a new one.");
      return;
    }
    var data=doc.data();
    if(data.used){
      alert("This invite link has already been used. Please ask for a new one.");
      return;
    }
    db.collection("inviteTokens").doc(token).update({used:true,usedAt:firebase.firestore.FieldValue.serverTimestamp()});
    ST.obGrpName=data.groupLabel||"Family";
    ST.obGrpEmoji=data.groupIcon||"\u2764\uFE0F";
    ST.joinInvite=true;
    ST.boarded=false;
    redraw();
  }).catch(function(e){
    console.log("token error:",e);
    alert("Could not validate invite link. Please try again.");
  });
}

try{
  if(localStorage.getItem("ku_ob")==="1"){

window.addEventListener("beforeinstallprompt",function(e){

  setTimeout(function(){

  var banner=document.createElement("div");

  banner.style.cssText="position:fixed;bottom:80px;left:12px;right:12px;background:#3D2314;color:white;padding:14px 16px;border-radius:16px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);font-family:Nunito,sans-serif;display:flex;align-items:center;gap:12px;animation:slideUp .3s ease;";
  var txt=document.createElement("div");txt.style.flex="1";

redraw();
// Wait for auth to resolve, then sync
var _lastUid=null;
auth.onAuthStateChanged(function(user){
  currentUser=user;
  var uid=user?user.uid:null;
  if(uid===_lastUid)return; // No change, don't restart
  _lastUid=uid;
  if(user){
    localStorage.setItem("ku_uid",user.uid);
    // Process pending invite token now that we have auth
    if(_pendingToken){
      var t=_pendingToken;_pendingToken=null;
      processInviteToken(t);
      return;
    }
    // Always check Firebase for existing profile - even if not boarded locally
    db.collection("members").doc(user.uid).get().then(function(doc){
      if(doc.exists){
        var m=doc.data();
        // Restore profile from Firebase
        if(m.name){ST.name=m.name;localStorage.setItem("ku_name",m.name);}
        if(m.av){ST.avatar=m.av;localStorage.setItem("ku_av",m.av);}
        if(m.groupLabel){
          ST.groups[0].label=m.groupLabel;
          ST.groups[0].icon=m.groupIcon||ST.groups[0].icon;
          localStorage.setItem("ku_grp",JSON.stringify({label:m.groupLabel,icon:m.groupIcon||ST.groups[0].icon}));
        }
        if(m.isAdmin!==undefined)localStorage.setItem("ku_admin",m.isAdmin?"1":"0");
        // Load groups from Firestore
        db.collection("userGroups").doc(user.uid).get().then(function(gdoc){
          if(gdoc.exists&&gdoc.data().groups&&gdoc.data().groups.length>0){
            var savedGroups=gdoc.data().groups;
            savedGroups.forEach(function(sg){if(!ST.groups.find(function(g){return g.id===sg.id;}))ST.groups.push(sg);});
            try{localStorage.setItem("ku_groups",JSON.stringify(ST.groups));}catch(e){}
          }
          ST.boarded=true;
          localStorage.setItem("ku_ob","1");
          fetchAllFeeds();
          syncOn();
          redraw();
        }).catch(function(){
          ST.boarded=true;
          localStorage.setItem("ku_ob","1");
          fetchAllFeeds();
          syncOn();
          redraw();
        });
      } else if(ST.boarded){
        // No Firebase profile but locally boarded - sync anyway
        fetchAllFeeds();
        syncOn();
        redraw();
      } else {
        // New user - show onboarding
        redraw();
      }
    }).catch(function(){
      // Error loading profile - fall back to local state
      if(ST.boarded){fetchAllFeeds();syncOn();}
      redraw();
    });
  } else {
    // Always redraw so "Signing you in..." clears
    redraw();
  }
});
