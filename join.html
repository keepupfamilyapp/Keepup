<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Join Keep Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Nunito,sans-serif;background:#FAF6F0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
.logo{font-family:Georgia,serif;font-size:36px;font-style:italic;color:#C4714A;margin-bottom:8px;}
p{color:#9B7B62;font-size:15px;margin-bottom:24px;line-height:1.6;}
.btn{background:#C4714A;color:white;border:none;padding:16px 32px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;margin-top:8px;}
</style>
</head>
<body>
<div class="logo">keep up</div>
<p>You've been invited to join a family group on Keep Up.</p>
<a class="btn" id="joinBtn">Open Keep Up</a>
<script>
var params=new URLSearchParams(window.location.search);
var token=params.get("token");
var appUrl="https://keepupfamilyapp.github.io/Keepup/";
if(token){
  // Save to localStorage AND pass via hash - belt and suspenders
  try{localStorage.setItem("ku_pending_token",token);}catch(e){}
  appUrl+="#token="+token;
}
document.getElementById("joinBtn").href=appUrl;
// Auto redirect
setTimeout(function(){window.location.href=appUrl;},1500);
</script>
</body>
</html>
