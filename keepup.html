*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
body{font-family:Nunito,sans-serif;background:#FAF6F0;color:#3D2314;}
#app{height:100vh;height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.scr{overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;}

input,select,textarea,button{font-family:inherit;}
.overlay{position:fixed;inset:0;background:rgba(61,35,20,.45);z-index:60;display:flex;align-items:flex-end;animation:fadeIn .2s ease;}
.sheet{width:100%;max-width:430px;margin:0 auto;background:#FFF9F2;border-radius:24px 24px 0 0;padding:18px 18px 36px;animation:slideUp .25s ease;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.handle{width:44px;height:5px;border-radius:5px;background:#C9A882;margin:0 auto 14px;opacity:.35;}
.bigbtn{width:100%;padding:15px;border-radius:50px;background:#C4714A;border:none;color:white;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(196,113,74,.35);}
.bigbtn:disabled{background:#D4B8A8;box-shadow:none;cursor:not-allowed;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#FFF9F2;border-top:2px solid #F5DDD1;display:flex;padding:8px 0 18px;z-index:50;}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:2px 0;background:none;border:none;}
.navdot{width:15px;height:3px;border-radius:3px;background:#C4714A;margin-top:1px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

// ── RENDER ─────────────────────────────────────────────────────
function h(tag,attrs){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='class')el.className=attrs[k];
    else if(k==='style'&&typeof attrs[k]==='object')Object.assign(el.style,attrs[k]);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==='innerHTML')el.innerHTML=attrs[k];
    else if(k==='value'){el.value=attrs[k];}
    else if(k==='disabled')attrs[k]&&el.setAttribute('disabled','');
    else if(k==='placeholder')el.placeholder=attrs[k];
    else if(k==='type')el.type=attrs[k];
    else if(k==='rows')el.rows=attrs[k];
    else if(k==='accept')el.accept=attrs[k];
    else el.setAttribute(k,attrs[k]);
  });
  return el;
}
function t(){return document.createTextNode(Array.from(arguments).join(''));}
function app(children){
  var el=h('div',{id:'app'});
  (Array.isArray(children)?children:[children]).forEach(function(c){if(c)el.appendChild(typeof c==='string'?t(c):c);});
  return el;
}
function div(attrs,children){
  var el=h('div',attrs);
  if(children)(Array.isArray(children)?children:[children]).forEach(function(c){if(c!=null)el.appendChild(typeof c==='string'?t(c):c);});
  return el;
}
function btn(attrs,label){var el=h('button',attrs);el.appendChild(t(label));return el;}
function inp(attrs){return h('input',attrs);}
function txt(attrs){return h('textarea',attrs);}
function span(attrs,content){var el=h('span',attrs);if(content)el.appendChild(typeof content==='string'?t(content):content);return el;}

function update(){
  var old=document.getElementById('app');
  var next=render();
  if(old)old.replaceWith(next);
  else document.body.appendChild(next);
}

function set(key,val){S[key]=val;update();}
function setNested(obj,key,val){S[obj]=Object.assign({},S[obj]);S[obj][key]=val;update();}

// ── HELPERS ────────────────────────────────────────────────────
function topbar(t,extra){
  return div({style:{background:t.cb,padding:'11px 13px 9px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid '+t.ap,flexShrink:0}},[
    div({style:{fontFamily:'Lora,serif',fontSize:'20px',fontWeight:600,color:t.a},innerHTML:'keep <em>up</em>'}),
    div({style:{display:'flex',gap:'6px',alignItems:'center'}},extra||[]),
  ]);
}
function handle(){return div({style:{width:'44px',height:'5px',borderRadius:'5px',background:'#C9A882',margin:'0 auto 14px',opacity:.35}});}
function overlay(content,onClose){
  var el=div({class:'overlay'});
  el.addEventListener('click',onClose);
  var sheet=div({class:'sheet'});
  sheet.addEventListener('click',function(e){e.stopPropagation();});
  (Array.isArray(content)?content:[content]).forEach(function(c){if(c)sheet.appendChild(typeof c==='string'?t(c):c);});
  el.appendChild(sheet);
  return el;
}
function bigbtn(label,onClick,disabled){
  var el=btn({class:'bigbtn',onKeydown:function(){}},label);
  if(disabled)el.disabled=true;
  el.addEventListener('click',onClick);
  return el;
}
function navbar(){
  var t=gt(S.group);
  var tabs=[{id:'feed',icon:'🏠',label:'Home'},{id:'chat',icon:'💬',label:'Chat'},{id:'calendar',icon:'📅',label:'Calendar'},{id:'profile',icon:'👤',label:'Profile'}];
  return div({class:'nav'},tabs.map(function(n){
    var isActive=S.tab===n.id;
    var b=div({class:'navbtn',style:{cursor:'pointer'}});
    b.appendChild(div({style:{fontSize:'20px',textAlign:'center'},innerHTML:n.icon}));
    b.appendChild(div({style:{fontSize:'10px',fontWeight:800,color:isActive?t.a:'#9B7B62',textAlign:'center'}},n.label));
    if(isActive)b.appendChild(div({style:{width:'15px',height:'3px',borderRadius:'3px',background:t.a,margin:'1px auto 0'}}));
    b.addEventListener('click',function(){S.tab=n.id;if(n.id==='chat')S.openChat=null;update();});
    return b;
  }));
}

// ── ONBOARDING ─────────────────────────────────────────────────
function renderOnboarding(){
  var step=['welcome','name','avatar','grp','done'][S.obStep];
  var wrap=div({id:'app',style:{background:'#FAF6F0',display:'flex',flexDirection:'column',height:'100vh'}});

  if(S.obStep>0&&S.obStep<4){
    var dots=div({style:{display:'flex',justifyContent:'center',gap:'5px',padding:'18px 0 0'}});
    [1,2,3].forEach(function(i){dots.appendChild(div({style:{width:i<=S.obStep?'24px':'7px',height:'7px',borderRadius:'7px',background:i<=S.obStep?'#C4714A':'#E8C4A8',transition:'all .3s'}},[]));});
    wrap.appendChild(dots);
    var back=btn({style:{position:'absolute',top:'14px',left:'14px',background:'#F5DDD1',border:'none',borderRadius:'50px',padding:'7px 13px',fontSize:'13px',fontWeight:700,color:'#6B4226',cursor:'pointer'}},'Back');
    back.addEventListener('click',function(){S.obStep--;update();});
    wrap.appendChild(back);
  }

  if(step==='welcome'){
    var hero=div({style:{flex:'0 0 46%',background:'linear-gradient(170deg,#F5DDD1,#FAF0E6 60%,#E8F2E9)',display:'flex',alignItems:'center',justifyContent:'center'}});
    var icon=div({style:{fontSize:'72px',animation:'float 3s ease-in-out infinite'}},[]); icon.textContent='🏡';
    hero.appendChild(icon); wrap.appendChild(hero);
    var body=div({style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 26px 32px'}});
    body.appendChild(div({style:{fontFamily:'Lora,serif',fontSize:'30px',fontWeight:600,color:'#C4714A',marginBottom:'8px',textAlign:'center'},innerHTML:'keep <em>up</em>'}));
    body.appendChild(div({style:{fontSize:'15px',color:'#6B4C35',textAlign:'center',lineHeight:1.65,marginBottom:'24px'}},'Stay close to the people who matter most. No ads. No algorithms.'));
    body.appendChild(bigbtn('Get Started',function(){S.obStep=1;update();}));
    wrap.appendChild(body);
  }

  if(step==='name'){
    var body=div({style:{flex:1,display:'flex',flexDirection:'column',padding:'64px 24px 32px',animation:'fadeUp .4s ease both'}});
    body.appendChild(div({style:{fontFamily:'Lora,serif',fontSize:'24px',fontWeight:600,color:'#3D2314',marginBottom:'8px'}},"What's your name?"));
    body.appendChild(div({style:{fontSize:'14px',color:'#9B7B62',marginBottom:'20px',lineHeight:1.6}},'Use whatever your family calls you.'));
    var input=inp({type:'text',placeholder:'e.g. Mom, Grandpa Joe, Jake...',style:{padding:'14px 16px',borderRadius:'13px',border:'2px solid #E8956D',background:'#FFF9F2',fontSize:'16px',color:'#3D2314',outline:'none',width:'100%',marginBottom:'10px'}});
    input.value=S.name;
    input.addEventListener('input',function(){S.name=this.value;});
    body.appendChild(input);
    body.appendChild(div({style:{flex:1}}));
    body.appendChild(bigbtn('Continue',function(){if(!S.name.trim())return;localStorage.setItem('ku_name',S.name);S.obStep=2;update();}));
    wrap.appendChild(body);
    setTimeout(function(){input.focus();},100);
  }

  if(step==='avatar'){
    var body=div({style:{flex:1,display:'flex',flexDirection:'column',padding:'64px 24px 32px',animation:'fadeUp .4s ease both'}});
    body.appendChild(div({style:{fontFamily:'Lora,serif',fontSize:'24px',fontWeight:600,color:'#3D2314',marginBottom:'8px'}},'Pick your picture'));
    var preview=div({style:{display:'flex',alignItems:'center',gap:'12px',background:'#FFF9F2',borderRadius:'13px',padding:'13px',marginBottom:'18px',border:'1.5px solid #F5DDD1'}});
    var avi=div({style:{width:'46px',height:'46px',borderRadius:'50%',background:'#F5DDD1',border:'2px solid #E8956D',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px'}});
    avi.textContent=S.avatar;
    preview.appendChild(avi);
    preview.appendChild(div({style:{fontSize:'15px',fontWeight:700,color:'#3D2314'}},S.name||'Your Name'));
    body.appendChild(preview);
    var grid=div({style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px',marginBottom:'18px'}});
    AVTS.forEach(function(a){
      var b=btn({style:{aspectRatio:1,borderRadius:'13px',background:S.avatar===a?'#F5DDD1':'#FFF9F2',border:'2px solid '+(S.avatar===a?'#C4714A':'rgba(107,66,38,.12)'),fontSize:'24px',cursor:'pointer'}},a);
      b.addEventListener('click',function(){S.avatar=a;localStorage.setItem('ku_av',a);update();});
      grid.appendChild(b);
    });
    body.appendChild(grid);
    body.appendChild(div({style:{flex:1}}));
    body.appendChild(bigbtn("That's me!",function(){S.obStep=3;update();}));
    wrap.appendChild(body);
  }

  if(step==='grp'){
    var body=div({style:{flex:1,display:'flex',flexDirection:'column',padding:'64px 24px 32px',animation:'fadeUp .4s ease both'}});
    body.appendChild(div({style:{fontFamily:'Lora,serif',fontSize:'24px',fontWeight:600,color:'#3D2314',marginBottom:'8px'}},'Create your first group'));
    var ginput=inp({type:'text',placeholder:"e.g. The Johnsons, Immediate Family...",style:{padding:'14px 16px',borderRadius:'13px',border:'2px solid #E8956D',background:'#FFF9F2',fontSize:'16px',color:'#3D2314',outline:'none',width:'100%',marginBottom:'16px'}});
    ginput.value=S.grpName;
    ginput.addEventListener('input',function(){S.grpName=this.value;});
    body.appendChild(ginput);
    var egrid=div({style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'20px'}});
    GEMJ.forEach(function(e){
      var b=btn({style:{width:'44px',height:'44px',borderRadius:'11px',background:S.grpEmoji===e?'#F5DDD1':'#FFF9F2',border:'2px solid '+(S.grpEmoji===e?'#C4714A':'rgba(107,66,38,.12)'),fontSize:'21px',cursor:'pointer'}},e);
      b.addEventListener('click',function(){S.grpEmoji=e;update();});
      egrid.appendChild(b);
    });
    body.appendChild(egrid);
    body.appendChild(div({style:{flex:1}}));
    body.appendChild(bigbtn('Create Group',function(){
      if(!S.grpName.trim())return;
      S.groups=[{id:'imm',label:S.grpName,icon:S.grpEmoji}];
      S.obStep=4;update();
    }));
    wrap.appendChild(body);
  }

  if(step==='done'){
    var body=div({style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 26px',animation:'fadeUp .5s ease both'}});
    var ei=div({style:{fontSize:'66px',marginBottom:'16px',animation:'float 3s ease-in-out infinite'}}); ei.textContent='🎉';
    body.appendChild(ei);
    body.appendChild(div({style:{fontFamily:'Lora,serif',fontSize:'26px',fontWeight:600,color:'#3D2314',marginBottom:'9px',textAlign:'center'}},"You're all set, "+(S.name||'friend')+'!'));
    body.appendChild(div({style:{fontSize:'14px',color:'#6B4C35',textAlign:'center',lineHeight:1.7,marginBottom:'26px'}},S.grpEmoji+' '+(S.grpName||'Your Family')+' is ready. Invite your family!'));
    body.appendChild(bigbtn('Take me to Keep Up',function(){localStorage.setItem('ku_ob','1');S.boarded=true;update();}));
    wrap.appendChild(body);
  }
  return wrap;
}

function renderFeedItem(item,i,t){
  var pc=S.cmts[item.id]||[];
  var wrap=div({style:{animation:'fadeUp .3s ease both',animationDelay:(i*.06)+'s'}});

  if(item.type==='photo'){
    var card=div({style:{background:t.cb,borderRadius:'17px',overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,.07)',border:'1px solid '+t.ap}});
    var hdr=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'10px 12px 7px'}});
    var avi=div({style:{width:'36px',height:'36px',borderRadius:'50%',background:t.ap,border:'2px solid '+t.ap,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',flexShrink:0}}); avi.textContent=item.av;
    hdr.appendChild(avi);
    var nm=div(); nm.appendChild(div({style:{fontSize:'14px',fontWeight:700,color:'#3D2314'}},item.name)); nm.appendChild(div({style:{fontSize:'11px',color:'#9B7B62'}},item.time));

      upSheet.appendChild(uh3);
      var ub3=div({class:'scr',style:{padding:'14px 15px'}});
      var ta2=txt({placeholder:"Let your family know how you're doing...",rows:5,style:{width:'100%',padding:'12px',borderRadius:'13px',border:'2px solid #F5DDD1',background:'#FAF6F0',fontSize:'15px',color:'#3D2314',outline:'none',resize:'none',lineHeight:1.6,marginBottom:'12px'}});
      ta2.value=S.upCi;ta2.addEventListener('input',function(){S.upCi=this.value;});
      ub3.appendChild(ta2);
      ['Good morning! Starting the day with...','Been thinking about everyone. Miss you all!','Good news! ','Quiet day today. Anyone free for a call?'].forEach(function(p){
        var pb=btn({style:{display:'flex',alignItems:'center',gap:'8px',padding:'9px 11px',borderRadius:'11px',textAlign:'left',background:'#FFF9F2',border:'1.5px solid #F5DDD1',cursor:'pointer',width:'100%',marginBottom:'6px',fontSize:'12px',color:'#6B4C35',fontWeight:600}},p);
        pb.addEventListener('click',function(){S.upCi=p;ta2.value=p;});
        ub3.appendChild(pb);
      });
      upSheet.appendChild(ub3);
      var uf3=div({style:{padding:'12px 15px 26px',flexShrink:0}});
      var csb2=btn({style:{width:'100%',padding:'13px',borderRadius:'50px',background:t.a,border:'none',color:'white',fontSize:'14px',fontWeight:800,cursor:'pointer'}},'Post Check-in');
      csb2.addEventListener('click',submitPost);uf3.appendChild(csb2);upSheet.appendChild(uf3);
    }

    upOv.appendChild(upSheet);wrap.appendChild(upOv);
  }

  if(S.newDm){
    var dmGrp2=S.groups.find(function(g){return g.id===S.dmGrp;})||S.groups[0];var dmMems=S.mems[S.dmGrp]||[];
    var dmSheet=[handle(),div({style:{fontFamily:'Lora,serif',fontSize:'18px',fontWeight:600,color:'#3D2314',marginBottom:'12px'}},'New Direct Message')];
    var gpr=div({style:{display:'flex',gap:'6px',marginBottom:'11px',overflowX:'auto'}});
    S.groups.forEach(function(g){var gt2=gt(g.id);var gb2=btn({style:{flexShrink:0,display:'flex',alignItems:'center',gap:'4px',padding:'5px 10px',borderRadius:'50px',background:S.dmGrp===g.id?gt2.ap:'#FAF6F0',border:'2px solid '+(S.dmGrp===g.id?gt2.a:'rgba(107,66,38,.12)'),fontSize:'12px',fontWeight:700,color:S.dmGrp===g.id?gt2.ad:'#6B4C35',cursor:'pointer'}},g.icon+' '+g.label);gb2.addEventListener('click',function(){S.dmGrp=g.id;S.dmSel=[];update();});gpr.appendChild(gb2);});
    dmSheet.push(gpr);
    dmMems.filter(function(m){return!m.you;}).forEach(function(mem){
      var gt2=gt(S.dmGrp);var sel=S.dmSel.includes(mem.id);
      var mr=div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'9px 11px',borderRadius:'13px',background:sel?gt2.ap:'#FAF6F0',border:'2px solid '+(sel?gt2.a:'rgba(107,66,38,.1)'),cursor:'pointer',marginBottom:'6px'}});
      var ma=div({style:{width:'34px',height:'34px',borderRadius:'50%',background:sel?gt2.al:gt2.ap,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'17px',flexShrink:0}});ma.textContent=mem.av;mr.appendChild(ma);
      mr.appendChild(div({style:{flex:1,fontSize:'13px',fontWeight:700,color:'#3D2314'}},mem.name));
      var ck=div({style:{width:'20px',height:'20px',borderRadius:'50%',background:sel?gt2.a:'white',border:'2px solid '+(sel?gt2.a:'rgba(107,66,38,.18)'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',color:'white',fontWeight:700}},sel?'✓':'');
      mr.appendChild(ck);
      mr.addEventListener('click',function(){if(sel)S.dmSel=S.dmSel.filter(function(x){return x!==mem.id;});else S.dmSel.push(mem.id);update();});
      dmSheet.push(mr);
    });
    var dsb=bigbtn(S.dmSel.length===0?'Select someone':'Start Chat',function(){
      if(!S.dmSel.length)return;
      var sm=dmMems.filter(function(m){return S.dmSel.includes(m.id);});
      var nid='dm-'+Date.now();
      S.dms.push({id:nid,members:sm,last:'',lt:'Now'});
      S.chatMsgs[nid]=[];S.dmSel=[];S.newDm=false;S.openChat={type:'dm',id:nid};update();
    },S.dmSel.length===0);
    dmSheet.push(dsb);
    wrap.appendChild(overlay(dmSheet,function(){S.newDm=false;S.dmSel=[];update();}));
  }

  return wrap;
}

function sendChat(cid,isDm){
  var iv=S.chatIn[cid]||'';if(!iv.trim())return;
  var msg={id:Date.now(),av:S.avatar,name:S.name||'You',text:iv.trim(),time:'Just now',you:true};
  if(!S.chatMsgs[cid])S.chatMsgs[cid]=[];
  S.chatMsgs[cid].push(msg);
  S.chatIn[cid]='';
  if(isDm){var dm=S.dms.find(function(d){return d.id===cid;});if(dm){dm.last=iv.trim();dm.lt='Just now';}}
  update();
}

function addComment(pid){
  if(!S.cmtIn.trim())return;
  if(!S.cmts[pid])S.cmts[pid]=[];
  S.cmts[pid].push({id:Date.now(),av:S.avatar,name:S.name||'You',text:S.cmtIn.trim(),time:'Just now'});
  S.cmtIn='';update();
}

function submitPost(){
  var p;
  if(S.upType==='checkin'){p={id:Date.now(),type:'checkin',av:S.avatar,name:S.name||'You',time:'Just now',status:S.upCi};}
  else{p={id:Date.now(),type:'photo',av:S.avatar,name:S.name||'You',time:'Just now',emoji:S.upImg?null:S.upEmoji,imgUrl:S.upImg,cap:S.upCap};}
  if(!S.feed[S.group])S.feed[S.group]=[];
  S.feed[S.group].unshift(p);
  S.upStep=4;update();
  setTimeout(function(){S.upOpen=false;S.upStep=1;update();},2200);
}

// ── BOOT ───────────────────────────────────────────────────────
update();
</script>
</body>
</html>
