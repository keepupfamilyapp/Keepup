  const [obGroupName, setObGroupName]   = useState("");
  const [obGroupEmoji, setObGroupEmoji] = useState("❤️");

  const [activeGroup, setActiveGroup]   = useState("imm");
  const [groups, setGroups]             = useState(INITIAL_GROUPS);

  const [reactionPicker, setReactionPicker] = useState(null);
  const [rsvp, setRsvp]                 = useState({});
  const [comments, setComments]         = useState(INITIAL_COMMENTS);
  const [commentOpen, setCommentOpen]   = useState(null);
  const [commentInput, setCommentInput] = useState("");
  const [inviteOpen, setInviteOpen]     = useState(false);
  const [inviteInput, setInviteInput]   = useState("");
  const [pendingInvites, setPendingInvites] = useState([{ id:99, email:"grandpa.joe@email.com", status:"Invite sent · awaiting" }]);
  const [copied, setCopied]             = useState(false);
  const [inviteSent, setInviteSent]     = useState(false);
  const [groupName, setGroupName]       = useState("");
  const [groupEmoji, setGroupEmoji]     = useState("❤️");
  const [members, setMembers]           = useState({
    imm:  [{id:1,avatar:"👩",name:"You (Sarah)",role:"Admin · pays for this group",you:true},{id:2,avatar:"👨",name:"Mike",role:"Member"},{id:3,avatar:"👦",name:"Jake",role:"Member"},{id:4,avatar:"👧",name:"Lily",role:"Member"}],
    moms: [{id:5,avatar:"👵",name:"Grandma Rose",role:"Admin · pays for this group"},{id:1,avatar:"👩",name:"You (Sarah)",role:"Member",you:true},{id:6,avatar:"🧑",name:"Uncle Tom",role:"Member"}],
  });
  const [events, setEvents]             = useState(EVENTS_DATA);
  const [addEventOpen, setAddEventOpen] = useState(false);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [newEvent, setNewEvent]         = useState({ title:"", month:"APR", day:"", time:"", location:"", group:"Immediate" });
  const [textSize, setTextSize]         = useState("normal");

  // Upload flow
  const [uploadOpen, setUploadOpen]     = useState(false);
  const [uploadStep, setUploadStep]     = useState(1);
  const [uploadType, setUploadType]     = useState("photo");
  const [uploadEmoji, setUploadEmoji]   = useState("🌻");
  const [uploadCaption, setUploadCaption] = useState("");
  const [uploadCheckin, setUploadCheckin] = useState("");
  const [feedPosts, setFeedPosts]       = useState(FEED_BY_GROUP);
  const [showEmpty, setShowEmpty]       = useState(false);

  // Chat state
  const [openChat, setOpenChat]         = useState(null); // {type:"group"|"dm", id}
  const [newDmOpen, setNewDmOpen]       = useState(false);
  const [dmGroupPick, setDmGroupPick]   = useState("imm"); // which group to pull members from
  const [dmSelected, setDmSelected]     = useState([]);    // member ids selected
  const [chatInputs, setChatInputs]     = useState({});    // keyed by chat id
  const [chatMessages, setChatMessages] = useState({
    "dm-1": [
      { id:1, avatar:"👦", name:"Jake", text:"Hey Mom, are you joining Easter brunch?", time:"Yesterday" },
      { id:2, avatar:"👩", name:"You",  text:"Yes! I'm bringing the potato salad 🥗", time:"Yesterday", you:true },
      { id:3, avatar:"👦", name:"Jake", text:"Perfect!! Can't wait 🐣", time:"Yesterday" },
    ],
  });
  const [directMessages, setDirectMessages] = useState([
    { id:"dm-1", members:[{id:3,avatar:"👦",name:"Jake"}], lastMessage:"Perfect!! Can't wait 🐣", lastTime:"Yesterday" },
  ]);

  // Preview image from file
  const [previewDataUrl, setPreviewDataUrl] = useState(null);
  const fileInputRef = useRef(null);

  const t = getTheme(activeGroup);
  const fs = textSize === "xlarge" ? 1.22 : textSize === "large" ? 1.1 : 1;
  const px = (n) => Math.round(n * fs);

  // ── HELPERS ──────────────────────────────────────────────────────────────────
  const toggleRsvp     = id => setRsvp(r => ({...r,[id]:!r[id]}));
  const handleReact    = (id, emoji) => { setReactions(r => ({...r,[id]: r[id]===emoji?null:emoji})); setReactionPicker(null); };
  const handleCopy     = () => { setCopied(true); setTimeout(()=>setCopied(false),2000); };
  const getMembers     = gid => members[gid] || [{id:1,avatar:"👩",name:"You (Sarah)",role:"Admin · pays for this group",you:true}];
  const isAdmin        = gid => !!getMembers(gid).find(x=>x.you&&x.role.includes("Admin"));
  const removeMember   = (gid,mid) => setMembers(m=>({...m,[gid]:getMembers(gid).filter(x=>x.id!==mid)}));
  const postComments   = id => comments[id]||[];

  const handleAddComment = (postId) => {
    if(!commentInput.trim()) return;
    const c = { id:Date.now(), avatar:obAvatar||"👩", name:obName||"You", text:commentInput.trim(), time:"Just now" };
    setComments(prev => ({...prev, [postId]:[...postComments(postId), c]}));
    setCommentInput("");
  };

  const handleSendInvite = () => {
    if(!inviteInput.trim()) return;
    setPendingInvites(p=>[...p,{id:Date.now(),email:inviteInput.trim(),status:"Invite sent · awaiting"}]);
    setInviteInput(""); setInviteSent(true); setTimeout(()=>setInviteSent(false),3000);
  };

  const handleAddEvent = () => {
    if(!newEvent.title.trim()||!newEvent.day) return;
    setEvents(ev=>[...ev,{...newEvent,id:Date.now(),going:1,maybe:0,day:parseInt(newEvent.day)||1}]);
    setNewEvent({title:"",month:"APR",day:"",time:"",location:"",group:"Immediate"});
    setAddEventOpen(false);
  };

  const openUpload = (type) => {
    setUploadType(type);
    setUploadStep(type === "photo" ? 2 : type === "checkin" ? 3 : 2);
    setUploadCaption("");
    setUploadCheckin("");
    setUploadEmoji("🌻");
    setPreviewDataUrl(null);
    setComposeOpen(false);
    setUploadOpen(true);
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPreviewDataUrl(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleSubmitPost = () => {
    const newPost = uploadType === "checkin"
      ? { id:Date.now(), type:"checkin", avatar:obAvatar||"👩", name:obName||"You", time:"Just now", status:uploadCheckin }
      : { id:Date.now(), type:"photo", avatar:obAvatar||"👩", name:obName||"You", time:"Just now",
          emoji: previewDataUrl ? null : uploadEmoji,
          imageUrl: previewDataUrl || null,
          caption:uploadCaption };
    setFeedPosts(fp => ({ ...fp, [activeGroup]: [newPost, ...(fp[activeGroup]||[])] }));
    setUploadStep(4); // success step
    setTimeout(() => { setUploadOpen(false); setUploadStep(1); }, 3000);
  };

  const handleCreateGroup = () => {
    if(!groupName.trim()) return;
    const newId="g"+Date.now();
    setGroups(g=>[...g,{id:newId,label:groupName.trim(),icon:groupEmoji}]);
    setMembers(m=>({...m,[newId]:[{id:1,avatar:"👩",name:"You (Sarah)",role:"Admin · pays for this group",you:true}]}));
    setGroupName(""); setGroupEmoji("❤️"); setActiveGroup(newId); setScreen("main");
  };

  const completeOnboarding = () => {
    if(obGroupName.trim()) setGroups([{id:"imm",label:obGroupName,icon:obGroupEmoji}]);
    setOnboarded(true);
  };

  // ── SHARED SUBCOMPONENTS ──────────────────────────────────────────────────────
  const BigBtn = ({onClick,children,disabled,style={}}) => (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%", padding:`${px(16)}px`, borderRadius:50,
      background:disabled?"#D4B8A8":"#C4714A", border:"none",
      color:"white", fontSize:px(17), fontWeight:800, cursor:disabled?"not-allowed":"pointer",
      boxShadow:disabled?"none":"0 6px 24px rgba(196,113,74,0.35)",
      transition:"opacity 0.15s", ...style
    }}>{children}</button>
  );

  const SheetHandle = ({color="#C9A882"}) => (
    <div style={{width:48,height:5,borderRadius:5,background:color,margin:"0 auto 18px",opacity:0.35}}/>
  );

        {tab==="feed"&&(
          <div style={{background:t.stripBg,borderBottom:`1px solid ${t.accentPale}`,transition:"background 0.3s"}}>
            <div style={{padding:"6px 16px 12px",display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none"}}>
              {groups.map(g=>{
                const gt=getTheme(g.id); const isActive=activeGroup===g.id;
                return (
                  <button key={g.id} onClick={()=>setActiveGroup(g.id)}
                    style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"10px 18px 10px 12px",borderRadius:50,background:isActive?gt.accentPale:t.bg,border:`2px solid ${isActive?gt.accent:"rgba(107,66,38,0.12)"}`,cursor:"pointer",fontSize:px(14),fontWeight:700,color:isActive?gt.accentDeep:"#6B4C35",transition:"all 0.2s"}}>
                    <span style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,background:isActive?gt.accentLight:"white"}}>{g.icon}</span>
                    {g.label}
                  </button>
                );
              })}
              <button onClick={()=>setScreen("createGroup")}
                style={{flexShrink:0,display:"flex",alignItems:"center",gap:6,padding:"10px 16px",borderRadius:50,background:t.bg,border:`2px dashed ${t.accentLight}`,cursor:"pointer",fontSize:px(13),fontWeight:700,color:t.accentDeep}}>
                ＋ New Group
              </button>
            </div>
          </div>
        )}

        {/* ── FEED ── */}
        {tab==="feed"&&(
          <>
            {/* ── EMPTY STATE — full screen, no scroll needed ── */}
            {currentFeed.length === 0 ? (
              <EmptyState
                groupId={activeGroup}
                groupInfo={activeGroupInfo}
                onShare={() => setComposeOpen(true)}
              />
            ) : (
              <>
                {/* Share prompt */}
                <div style={{padding:"12px 16px 0",background:t.bg}}>
                  <button onClick={()=>setComposeOpen(true)}
                    style={{width:"100%",padding:"14px 18px",borderRadius:16,background:t.cardBg,border:`2px dashed ${t.accentLight}`,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
                    <div style={{width:38,height:38,borderRadius:"50%",background:t.accentPale,border:`2px solid ${t.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{obAvatar||"👩"}</div>
                    <span style={{fontSize:px(14),color:"#9B7B62",fontWeight:600}}>Share something with your family... 📸</span>
                  </button>
                </div>

                <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",padding:"14px 16px 100px",display:"flex",flexDirection:"column",gap:14}}>
                  {currentFeed.map((item,i)=>{
                    const postCmts = postComments(item.id);

                    if(item.type==="photo") return (
                      <div key={item.id} style={{background:t.cardBg,borderRadius:20,overflow:"hidden",boxShadow:"0 2px 14px rgba(0,0,0,0.07)",border:`1px solid ${t.accentPale}`,animation:"fadeUp 0.3s ease both",animationDelay:`${i*0.06}s`}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px 10px"}}>
                          <div style={{width:46,height:46,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:`2px solid ${t.accentPale}`,flexShrink:0,background:t.accentPale}}>{item.avatar}</div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{item.name}</div>
                            <div style={{fontSize:px(12),color:"#9B7B62",marginTop:2}}>{item.time}</div>
                          </div>
                          <button style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9B7B62",padding:"4px 8px"}}>•••</button>
                        </div>
                        {/* Image or emoji display */}
                        {item.imageUrl ? (
                          <img src={item.imageUrl} alt="post" style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",display:"block"}}/>
                        ) : (
                          <div style={{width:"100%",aspectRatio:"4/3",background:`linear-gradient(135deg,${t.accentPale} 0%,${t.stripBg} 100%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:64}}>{item.emoji}</div>
                        )}
                        <div style={{padding:"14px 16px"}}>
                          <div style={{fontSize:px(15),lineHeight:1.6,color:"#3D2314"}}>{item.caption}</div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,flexWrap:"wrap"}}>
                            {reactions[item.id]&&(
                              <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:50,background:t.accentPale,border:`1.5px solid ${t.accentLight}`,fontSize:px(14),fontWeight:600,color:t.accentDeep}}>
                                {reactions[item.id]} <span style={{fontSize:px(12)}}>You reacted</span>
                              </div>
                            )}
                            <button onClick={()=>setReactionPicker(reactionPicker===item.id?null:item.id)}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:50,background:t.bg,border:`2px solid ${t.accentPale}`,fontSize:px(14),fontWeight:700,color:"#6B4C35",cursor:"pointer"}}>
                              😊 {reactions[item.id]?"Change":"React"}
                            </button>
                            <button onClick={()=>{setCommentOpen(item.id);setCommentInput("");}}
                              style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:50,background:t.bg,border:`2px solid ${t.accentPale}`,fontSize:px(14),fontWeight:700,color:"#6B4C35",cursor:"pointer",marginLeft:"auto"}}>
                              💬 {postCmts.length>0?`${postCmts.length} Comment${postCmts.length!==1?"s":""}` : "Comment"}
                            </button>
                            {reactionPicker===item.id&&(
                              <div style={{width:"100%",display:"flex",gap:8,padding:"8px 0 2px",animation:"popIn 0.18s ease"}}>
                                {REACTIONS.map(emoji=>(
                                  <button key={emoji} onClick={()=>handleReact(item.id,emoji)}
                                    style={{flex:1,fontSize:26,padding:"10px 0",borderRadius:14,background:reactions[item.id]===emoji?t.accentPale:t.bg,border:`2px solid ${reactions[item.id]===emoji?t.accentLight:t.accentPale}`,cursor:"pointer"}}>
                                    {emoji}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                          {postCmts.length>0&&(
                            <button onClick={()=>{setCommentOpen(item.id);setCommentInput("");}}
                              style={{width:"100%",marginTop:12,background:t.bg,border:`1px solid ${t.accentPale}`,borderRadius:14,padding:"10px 14px",textAlign:"left",cursor:"pointer",display:"flex",gap:8,alignItems:"center"}}>
                              <span style={{fontSize:18}}>{postCmts[postCmts.length-1].avatar}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <span style={{fontSize:px(12),fontWeight:700,color:t.accentDeep}}>{postCmts[postCmts.length-1].name}: </span>
                                <span style={{fontSize:px(12),color:"#6B4C35"}}>{postCmts[postCmts.length-1].text}</span>
                              </div>
                              {postCmts.length>1&&<span style={{fontSize:px(12),color:"#9B7B62",flexShrink:0}}>+{postCmts.length-1} more</span>}
                            </button>
                          )}
                        </div>
                      </div>
                    );

                    if(item.type==="checkin") return (
                      <div key={item.id} style={{background:t.accentPale,border:`2px solid ${t.accentLight}`,borderRadius:20,padding:18,display:"flex",alignItems:"flex-start",gap:14,animation:"fadeUp 0.3s ease both",animationDelay:`${i*0.06}s`}}>
                        <div style={{width:50,height:50,borderRadius:"50%",background:t.accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{item.avatar}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:px(15),fontWeight:700,color:t.accentDeep}}>{item.name} checked in</div>
                          <div style={{fontSize:px(15),color:"#3D2314",marginTop:4,lineHeight:1.5}}>{item.status}</div>
                          <div style={{fontSize:px(12),color:"#9B7B62",marginTop:6}}>{item.time}</div>
                          <button onClick={()=>setReactionPicker(reactionPicker===item.id?null:item.id)}
                            style={{marginTop:10,display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:50,background:"white",border:`1.5px solid ${t.accentLight}`,fontSize:px(13),fontWeight:700,color:t.accentDeep,cursor:"pointer"}}>
                            {reactions[item.id]||"😊"} {reactions[item.id]?"Change Reaction":"React"}
                          </button>
                          {reactionPicker===item.id&&(
                            <div style={{display:"flex",gap:8,padding:"10px 0 4px",animation:"popIn 0.18s ease"}}>
                              {REACTIONS.map(emoji=>(
                                <button key={emoji} onClick={()=>handleReact(item.id,emoji)}
                                  style={{flex:1,fontSize:24,padding:"8px 0",borderRadius:12,background:reactions[item.id]===emoji?"white":t.accentPale,border:`2px solid ${reactions[item.id]===emoji?t.accentLight:"transparent"}`,cursor:"pointer"}}>
                                  {emoji}
                                </button>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );

                    if(item.type==="event") return (
                      <div key={item.id} style={{background:"#FBF0D9",border:"2px solid #E8C878",borderRadius:20,padding:18,animation:"fadeUp 0.3s ease both",animationDelay:`${i*0.06}s`}}>
                        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                          <div style={{width:54,height:54,borderRadius:14,background:"#D4922A",color:"white",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            <span style={{fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{item.month}</span>
                            <span style={{fontSize:22,fontWeight:700,lineHeight:1}}>{item.day}</span>
                          </div>
                          <div>
                            <div style={{fontSize:px(16),fontWeight:700,color:"#3D2314"}}>{item.title}</div>
                            <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2}}>{item.who}</div>
                          </div>
                        </div>
                        <div style={{fontSize:px(14),color:"#6B4C35",marginBottom:12}}>✅ {item.going} going · 🤔 {item.maybe} maybe</div>
                        <div style={{display:"flex",gap:10}}>
                          <button onClick={()=>toggleRsvp(item.id)} style={{flex:1,padding:"12px",borderRadius:50,border:"2px solid #D4922A",background:rsvp[item.id]?"#D4922A":"transparent",fontSize:px(14),fontWeight:700,color:rsvp[item.id]?"white":"#D4922A",cursor:"pointer"}}>
                            {rsvp[item.id]?"✅ I'm Going!":"Yes, I'll Be There"}
                          </button>
                          <button style={{flex:1,padding:"12px",borderRadius:50,border:"2px solid #D4922A",background:"transparent",fontSize:px(14),fontWeight:700,color:"#D4922A",cursor:"pointer"}}>Maybe</button>
                        </div>
                      </div>
                    );

                    return null;
                  })}
                </div>
              </>
            )}
          </>
        )}

        {/* ── CHAT INBOX ── */}
        {tab==="chat"&&!openChat&&(
          <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",padding:"12px 16px 100px"}}>

            {/* New DM button */}
            <button onClick={()=>setNewDmOpen(true)} style={{
              width:"100%",marginBottom:18,padding:"13px 18px",borderRadius:16,
              background:t.cardBg,border:`2px dashed ${t.accentLight}`,
              display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"
            }}>
              <div style={{width:38,height:38,borderRadius:"50%",background:t.accentPale,border:`2px solid ${t.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>✏️</div>
              <span style={{fontSize:px(14),color:t.accentDeep,fontWeight:700}}>New direct message…</span>
            </button>

            {/* Group chats */}
            <div style={{fontSize:px(11),fontWeight:800,color:"#9B7B62",letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:8}}>Group Chats</div>
            {groups.map(g=>{
              const ct=getTheme(g.id);
              const preview=GROUP_CHAT_PREVIEWS[g.id];
              return (
                <div key={g.id} onClick={()=>setOpenChat({type:"group",id:g.id})}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:18,background:ct.cardBg,border:`1.5px solid ${ct.accentPale}`,cursor:"pointer",marginBottom:8}}>
                  <div style={{width:48,height:48,borderRadius:"50%",background:ct.accentPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,border:`2px solid ${ct.accentLight}`}}>{g.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:6}}>
                      <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{g.label}</div>
                      {preview&&<div style={{fontSize:px(11),color:"#9B7B62",flexShrink:0}}>{preview.time}</div>}
                    </div>
                    {preview
                      ? <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{fontWeight:700,color:"#6B4C35"}}>{preview.who}:</span> {preview.text}</div>
                      : <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2}}>No messages yet — say hello!</div>
                    }
                  </div>
                  <div style={{fontSize:20,color:ct.accentLight,flexShrink:0}}>›</div>
                </div>
              );
            })}

            {/* Direct messages */}
            <div style={{fontSize:px(11),fontWeight:800,color:"#9B7B62",letterSpacing:"0.6px",textTransform:"uppercase",margin:"16px 0 8px"}}>Direct Messages</div>
            {directMessages.length===0 ? (
              <div style={{textAlign:"center",padding:"28px 16px",background:"#FFF9F2",borderRadius:18,border:"1.5px solid #F5DDD1"}}>
                <div style={{fontSize:36,marginBottom:8}}>💬</div>
                <div style={{fontSize:px(14),fontWeight:700,color:"#6B4C35",marginBottom:4}}>No direct messages yet</div>
                <div style={{fontSize:px(13),color:"#9B7B62",lineHeight:1.5}}>Tap "New direct message" above to chat privately with someone in your family.</div>
              </div>
            ) : directMessages.map(dm=>(
              <div key={dm.id} onClick={()=>setOpenChat({type:"dm",id:dm.id})}
                style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",borderRadius:18,background:"#FFF9F2",border:"1.5px solid #F5DDD1",cursor:"pointer",marginBottom:8}}>
                {/* Avatar stack */}
                <div style={{position:"relative",width:48,height:48,flexShrink:0}}>
                  {dm.members.length===1 ? (
                    <div style={{width:48,height:48,borderRadius:"50%",background:"#F5DDD1",border:"2px solid #E8956D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{dm.members[0].avatar}</div>
                  ) : (
                    <>
                      <div style={{position:"absolute",top:0,left:0,width:34,height:34,borderRadius:"50%",background:"#F5DDD1",border:"2px solid white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{dm.members[0].avatar}</div>
                      <div style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:"#E8956D",border:"2px solid white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{dm.members[1].avatar}</div>
                    </>
                  )}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",gap:6}}>
                    <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dm.members.map(m=>m.name).join(", ")}</div>
                    <div style={{fontSize:px(11),color:"#9B7B62",flexShrink:0}}>{dm.lastTime}</div>
                  </div>
                  <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dm.lastMessage}</div>
                </div>
                <div style={{fontSize:20,color:"#E8956D",flexShrink:0}}>›</div>
              </div>
            ))}
          </div>
        )}

        {/* ── CHAT VIEW (group or DM) ── */}
        {tab==="chat"&&openChat&&(()=>{
          const isDm = openChat.type==="dm";
          const chatId = openChat.id;
          const dm = isDm ? directMessages.find(d=>d.id===chatId) : null;
          const g = !isDm ? groups.find(g=>g.id===chatId) : null;
          const ct = !isDm ? getTheme(chatId) : {accent:"#C4714A",accentLight:"#E8956D",accentPale:"#F5DDD1",accentDeep:"#6B4226",bg:"#FAF6F0",cardBg:"#FFF9F2"};
          const title = isDm ? dm?.members.map(m=>m.name).join(", ") : g?.label;
          const icon = isDm ? (dm?.members.length===1 ? dm.members[0].avatar : "👥") : g?.icon;
          const msgs = chatMessages[chatId]||[];
          const inputVal = chatInputs[chatId]||"";

          const sendMsg = () => {
            if(!inputVal.trim()) return;
            const msg = {id:Date.now(),avatar:obAvatar||"👩",name:obName||"You",text:inputVal.trim(),time:"Just now",you:true};
            setChatMessages(prev=>({...prev,[chatId]:[...(prev[chatId]||[]),msg]}));
            setChatInputs(prev=>({...prev,[chatId]:""}));
            if(isDm) setDirectMessages(prev=>prev.map(d=>d.id===chatId?{...d,lastMessage:inputVal.trim(),lastTime:"Just now"}:d));
          };

          return (
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {/* Chat header */}
              <div style={{background:ct.cardBg,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${ct.accentPale}`,flexShrink:0}}>
                <button onClick={()=>setOpenChat(null)} style={{background:ct.accentPale,border:"none",borderRadius:50,padding:"7px 14px",fontSize:13,fontWeight:700,color:ct.accentDeep,cursor:"pointer",flexShrink:0}}>← Back</button>
                <div style={{width:38,height:38,borderRadius:"50%",background:ct.accentPale,border:`2px solid ${ct.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
                  {!isDm&&<div style={{fontSize:px(11),color:ct.accentLight,marginTop:1}}>{getMembers(chatId).length} members</div>}
                  {isDm&&<div style={{fontSize:px(11),color:"#9B7B62",marginTop:1}}>Private message</div>}
                </div>
              </div>

              {/* Messages */}
              <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",padding:"16px 16px 8px",display:"flex",flexDirection:"column",gap:12,background:ct.bg}}>
                {msgs.length===0&&(
                  <div style={{textAlign:"center",padding:"48px 24px",color:"#9B7B62"}}>
                    <div style={{fontSize:44,marginBottom:10}}>{icon}</div>
                    <div style={{fontSize:px(15),fontWeight:700,color:"#6B4C35",marginBottom:6}}>Start the conversation!</div>
                    <div style={{fontSize:px(13),lineHeight:1.5}}>{isDm?`This is just between you and ${title}.`:`Say hello to ${title}!`}</div>
                  </div>
                )}
                {msgs.map((msg,i)=>{
                  const isYou = msg.you;
                  return (
                    <div key={msg.id} style={{display:"flex",flexDirection:isYou?"row-reverse":"row",alignItems:"flex-end",gap:8,animation:"fadeUp 0.2s ease both",animationDelay:`${Math.min(i,6)*0.04}s`}}>
                      {!isYou&&<div style={{width:32,height:32,borderRadius:"50%",background:ct.accentPale,border:`1.5px solid ${ct.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{msg.avatar}</div>}
                      <div style={{maxWidth:"72%"}}>
                        {!isYou&&<div style={{fontSize:px(11),fontWeight:700,color:ct.accentDeep,marginBottom:4,paddingLeft:2}}>{msg.name}</div>}
                        <div style={{
                          padding:"11px 15px",
                          borderRadius:isYou?"18px 18px 4px 18px":"18px 18px 18px 4px",
                          background:isYou?ct.accent:"white",
                          color:isYou?"white":"#3D2314",
                          fontSize:px(14),lineHeight:1.55,
                          boxShadow:"0 1px 6px rgba(0,0,0,0.07)",
                          border:isYou?"none":`1px solid ${ct.accentPale}`
                        }}>{msg.text}</div>
                        <div style={{fontSize:px(10),color:"#9B7B62",marginTop:4,textAlign:isYou?"right":"left",paddingLeft:isYou?0:2}}>{msg.time}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Input */}
              <div style={{padding:"10px 14px 32px",borderTop:`1px solid ${ct.accentPale}`,background:ct.cardBg,flexShrink:0,display:"flex",gap:10,alignItems:"flex-end"}}>
                <div style={{flex:1,background:ct.bg,borderRadius:22,border:`1.5px solid ${ct.accentPale}`,display:"flex",alignItems:"center",padding:"10px 16px",gap:8}}>
                  <input
                    value={inputVal}
                    onChange={e=>setChatInputs(prev=>({...prev,[chatId]:e.target.value}))}
                    onKeyDown={e=>{if(e.key==="Enter"&&inputVal.trim()) sendMsg();}}
                    placeholder="Message…"
                    style={{flex:1,background:"none",border:"none",outline:"none",fontSize:px(15),color:"#3D2314"}}
                  />
                </div>
                <button onClick={sendMsg} disabled={!inputVal.trim()} style={{
                  width:44,height:44,borderRadius:"50%",flexShrink:0,
                  background:inputVal.trim()?ct.accent:"#D4B8A8",
                  border:"none",color:"white",fontSize:20,
                  cursor:inputVal.trim()?"pointer":"not-allowed",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"background 0.15s",
                  boxShadow:inputVal.trim()?`0 4px 14px ${ct.accent}55`:"none"
                }}>↑</button>
              </div>
            </div>
          );
        })()}

        {/* ── NEW DM PICKER ── */}
        {newDmOpen&&(
          <div onClick={()=>{setNewDmOpen(false);setDmSelected([]);}} style={{position:"fixed",inset:0,background:"rgba(61,35,20,0.45)",zIndex:60,display:"flex",alignItems:"flex-end",animation:"fadeIn 0.2s ease"}}>
            <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:420,margin:"0 auto",background:"#FFF9F2",borderRadius:"24px 24px 0 0",padding:"20px 20px 36px",animation:"slideUp 0.25s ease",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
              <div style={{width:48,height:5,borderRadius:5,background:"#C9A882",margin:"0 auto 18px",opacity:0.35}}/>
              <div style={{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314",marginBottom:4}}>New Direct Message</div>
              <div style={{fontSize:px(13),color:"#9B7B62",marginBottom:14}}>Choose family members to message privately.</div>

              {/* Group picker */}
              <div style={{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:8}}>Pick from group:</div>
              <div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
                {groups.map(g=>{
                  const gt=getTheme(g.id);
                  return (
                    <button key={g.id} onClick={()=>{setDmGroupPick(g.id);setDmSelected([]);}}
                      style={{flexShrink:0,display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:50,
                        background:dmGroupPick===g.id?gt.accentPale:"#FAF6F0",
                        border:`2px solid ${dmGroupPick===g.id?gt.accent:"rgba(107,66,38,0.12)"}`,
                        fontSize:px(13),fontWeight:700,color:dmGroupPick===g.id?gt.accentDeep:"#6B4C35",cursor:"pointer"}}>
                      {g.icon} {g.label}
                    </button>
                  );
                })}
              </div>

              {/* Member list */}
              <div style={{fontSize:px(12),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:8}}>Select people:</div>
              <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {getMembers(dmGroupPick).filter(m=>!m.you).map(mem=>{
                  const sel=dmSelected.includes(mem.id);
                  const gt=getTheme(dmGroupPick);
                  return (
                    <div key={mem.id} onClick={()=>setDmSelected(s=>sel?s.filter(x=>x!==mem.id):[...s,mem.id])}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:16,
                        background:sel?gt.accentPale:"#FAF6F0",
                        border:`2px solid ${sel?gt.accent:"rgba(107,66,38,0.1)"}`,
                        cursor:"pointer",transition:"all 0.15s"}}>
                      <div style={{width:42,height:42,borderRadius:"50%",background:sel?gt.accentLight:gt.accentPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,border:`2px solid ${sel?gt.accent:gt.accentPale}`}}>{mem.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{mem.name}</div>
                        <div style={{fontSize:px(12),color:"#9B7B62",marginTop:1}}>{mem.role}</div>
                      </div>
                      <div style={{width:26,height:26,borderRadius:"50%",background:sel?getTheme(dmGroupPick).accent:"white",border:`2px solid ${sel?getTheme(dmGroupPick).accent:"rgba(107,66,38,0.18)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14,color:"white",fontWeight:700,transition:"all 0.15s"}}>
                        {sel?"✓":""}
                      </div>
                    </div>
                  );
                })}
                {getMembers(dmGroupPick).filter(m=>!m.you).length===0&&(
                  <div style={{textAlign:"center",padding:"20px",color:"#9B7B62",fontSize:px(14)}}>No other members in this group yet.</div>
                )}
              </div>

              {/* Start button */}
              <button
                disabled={dmSelected.length===0}
                onClick={()=>{
                  const selMembers = getMembers(dmGroupPick).filter(m=>dmSelected.includes(m.id));
                  const newId = "dm-"+Date.now();
                  setDirectMessages(prev=>[...prev,{id:newId,members:selMembers,lastMessage:"",lastTime:"Now"}]);
                  setChatMessages(prev=>({...prev,[newId]:[]}));
                  setDmSelected([]); setNewDmOpen(false);
                  setOpenChat({type:"dm",id:newId});
                }}
                style={{
                  width:"100%",padding:"16px",borderRadius:50,
                  background:dmSelected.length>0?"#C4714A":"#D4B8A8",
                  border:"none",color:"white",fontSize:px(16),fontWeight:800,
                  cursor:dmSelected.length>0?"pointer":"not-allowed",
                  boxShadow:dmSelected.length>0?"0 6px 24px rgba(196,113,74,0.35)":"none",
                  transition:"all 0.2s"
                }}>
                {dmSelected.length===0?"Select someone to message":"Start Chat →"}
              </button>
            </div>
          </div>
        )}

        {/* ── CALENDAR ── */}
        {tab==="calendar"&&(
          <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",padding:"16px 16px 100px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <button style={{width:40,height:40,borderRadius:"50%",background:t.accentPale,border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",color:t.accentDeep,fontWeight:700}}>‹</button>
              <div style={{fontFamily:"Lora,serif",fontSize:px(18),fontWeight:600,color:"#3D2314"}}>April 2026</div>
              <button style={{width:40,height:40,borderRadius:"50%",background:t.accentPale,border:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",color:t.accentDeep,fontWeight:700}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
              {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{textAlign:"center",fontSize:px(11),fontWeight:700,color:"#9B7B62",padding:"6px 0"}}>{d}</div>)}
              {CAL_DAYS.map((d,i)=>(
                <div key={i} style={{aspectRatio:1,borderRadius:"50%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:px(13),fontWeight:600,color:d.d===8&&!d.m?"white":d.m?"rgba(107,66,38,0.2)":"#6B4C35",background:d.d===8&&!d.m?t.accent:"transparent",cursor:"pointer",position:"relative"}}>
                  {d.d}
                  {(d.ev||d.bday)&&(
                    <div style={{position:"absolute",bottom:2,display:"flex",gap:2}}>
                      {d.ev&&<span style={{width:4,height:4,borderRadius:"50%",background:d.d===8&&!d.m?"white":t.accentLight}}/>}
                      {d.bday&&<span style={{width:4,height:4,borderRadius:"50%",background:"#D4922A"}}/>}
                    </div>
                  )}
                </div>
              ))}
            </div>
            <button onClick={()=>setAddEventOpen(true)} style={{width:"100%",padding:"15px",borderRadius:16,background:t.accentPale,border:`2px dashed ${t.accentLight}`,fontSize:px(15),fontWeight:700,color:t.accentDeep,cursor:"pointer",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📅 Add a New Event
            </button>
            <div style={{fontFamily:"Lora,serif",fontSize:px(16),fontWeight:600,color:"#3D2314",marginBottom:12}}>🎂 Upcoming Birthdays</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:22}}>
              {BIRTHDAYS.map(b=>(
                <div key={b.name} style={{background:"#FBF0D9",border:"1.5px solid #E8C878",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:"#F8E4B0",border:"2px solid #E8C878",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{b.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{b.name}'s Birthday</div>
                    <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2}}>🎂 {b.date}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:px(12),fontWeight:700,color:"#D4922A",background:"#F8E4B0",borderRadius:50,padding:"4px 10px"}}>{b.daysLeft===0?"Today! 🎉":b.daysLeft===1?"Tomorrow!":b.daysLeft<7?`${b.daysLeft} days`:`${b.daysLeft}d`}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:"Lora,serif",fontSize:px(16),fontWeight:600,color:"#3D2314",marginBottom:12}}>📅 Upcoming Events</div>

              {events.map(ev=>(
                <div key={ev.id} onClick={()=>setSelectedEvent(ev)} style={{background:"#FBF0D9",border:"1.5px solid #E8C878",borderRadius:20,padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:ev.isBirthday?0:10}}>
                    <div style={{width:52,height:52,borderRadius:14,background:ev.isBirthday?"#E8C878":"#D4922A",color:"white",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{ev.month}</span>
                      <span style={{fontSize:22,fontWeight:700,lineHeight:1}}>{ev.day}</span>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{ev.title}</div>
                      <div style={{fontSize:px(12),color:"#9B7B62",marginTop:2}}>{ev.group}{ev.time?` · ${ev.time}`:""}</div>
                      {ev.location&&<div style={{fontSize:px(12),color:"#9B7B62"}}>📍 {ev.location}</div>}
                    </div>
                    <span style={{fontSize:20,color:"#D4922A"}}>›</span>
                  </div>
                  {!ev.isBirthday&&(
                    <>
                      <div style={{fontSize:px(13),color:"#6B4C35",marginBottom:10}}>✅ {ev.going+(rsvp[ev.id]?1:0)} going · 🤔 {ev.maybe} maybe</div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={e=>{e.stopPropagation();toggleRsvp(ev.id);}} style={{flex:1,padding:"11px",borderRadius:50,border:"2px solid #D4922A",background:rsvp[ev.id]?"#D4922A":"transparent",fontSize:px(13),fontWeight:700,color:rsvp[ev.id]?"white":"#D4922A",cursor:"pointer"}}>{rsvp[ev.id]?"✅ Going!":"Yes, I'll Be There"}</button>
                        <button onClick={e=>e.stopPropagation()} style={{flex:1,padding:"11px",borderRadius:50,border:"2px solid #D4922A",background:"transparent",fontSize:px(13),fontWeight:700,color:"#D4922A",cursor:"pointer"}}>Maybe</button>
                      </div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── FAB ── */}
        {tab === "feed" && currentFeed.length > 0 && (
          <button onClick={()=>setComposeOpen(true)} style={{position:"fixed",bottom:88,right:"50%",transform:"translateX(170px)",width:58,height:58,borderRadius:"50%",background:t.accent,border:"none",color:"white",fontSize:26,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 6px 24px ${t.accent}66`,cursor:"pointer",zIndex:40,transition:"background 0.3s"}}>＋</button>
        )}

        {/* ── BOTTOM NAV ── */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:t.cardBg,borderTop:`2px solid ${t.accentPale}`,display:"flex",padding:"10px 0 22px",zIndex:50,transition:"background 0.3s"}}>
          {[
            {id:"feed",  icon:"🏠", label:"Home"},
            {id:"chat",  icon:"💬", label:"Chat"},
            {id:"calendar",icon:"📅",label:"Calendar"},
            {id:"profile",icon:"👤",label:"My Profile"},
          ].map(n=>(
            <div key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"4px 0"}}>
              <span style={{fontSize:24}}>{n.icon}</span>
              <span style={{fontSize:px(11),fontWeight:800,color:tab===n.id?t.accent:"#9B7B62",transition:"color 0.3s",letterSpacing:"0.2px"}}>{n.label}</span>
              {tab===n.id&&<div style={{width:20,height:3,borderRadius:3,background:t.accent,marginTop:1}}/>}
            </div>
          ))}
        </div>

        {/* ── COMPOSE SHEET ── */}
        {composeOpen&&(
          <Overlay onClose={()=>setComposeOpen(false)}>
            <SheetHandle/>
            <div style={{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314",marginBottom:6}}>What would you like to share?</div>
            <div style={{fontSize:px(13),color:"#9B7B62",marginBottom:18}}>Sharing with: <strong style={{color:t.accent}}>{activeGroupInfo.icon} {activeGroupInfo.label}</strong></div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[
                {icon:"📷", label:"Share a Photo",      sub:"Add a photo from your camera roll with a caption", type:"photo"},
                {icon:"📍", label:"Post a Check-in",    sub:"Let family know how you're doing right now", type:"checkin"},
                {icon:"📅", label:"Add an Event",       sub:"Add something to the family calendar", type:"event"},
              ].map(opt=>(
                <div key={opt.label}
                  onClick={() => {
                    if(opt.type === "event") { setComposeOpen(false); setAddEventOpen(true); }
                    else openUpload(opt.type);
                  }}
                  style={{background:t.bg,border:`2px solid ${t.accentPale}`,borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                  <div style={{fontSize:28,width:52,height:52,borderRadius:14,background:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${t.accentPale}`}}>{opt.icon}</div>
                  <div>
                    <div style={{fontSize:px(15),fontWeight:700,color:"#3D2314"}}>{opt.label}</div>
                    <div style={{fontSize:px(12),color:"#9B7B62",marginTop:2}}>{opt.sub}</div>
                  </div>
                  <span style={{marginLeft:"auto",fontSize:20,color:t.accentLight}}>›</span>
                </div>
              ))}
            </div>
          </Overlay>
        )}

        {/* ── ADD EVENT SHEET ── */}
        {addEventOpen&&(
          <Overlay onClose={()=>setAddEventOpen(false)} maxHeight="88vh">
            <SheetHandle/>
            <div style={{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314",marginBottom:18}}>Add an Event 📅</div>
            {[
              {label:"Event Name",placeholder:"e.g. Easter Brunch, Jake's Birthday...",field:"title"},
              {label:"Time",placeholder:"e.g. 10:00 AM",field:"time"},
              {label:"Location",placeholder:"e.g. Grandma's house",field:"location"},
            ].map(f=>(
              <div key={f.field} style={{marginBottom:16}}>
                <label style={{fontSize:px(13),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:6,display:"block"}}>{f.label}</label>
                <input value={newEvent[f.field]} onChange={e=>setNewEvent(n=>({...n,[f.field]:e.target.value}))} placeholder={f.placeholder}
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(15),color:"#3D2314",outline:"none"}}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <div style={{flex:1}}>
                <label style={{fontSize:px(13),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:6,display:"block"}}>Month</label>
                <select value={newEvent.month} onChange={e=>setNewEvent(n=>({...n,month:e.target.value}))}
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(15),color:"#3D2314",outline:"none"}}>
                  {["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:px(13),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:6,display:"block"}}>Day</label>
                <input type="number" min="1" max="31" value={newEvent.day} onChange={e=>setNewEvent(n=>({...n,day:e.target.value}))} placeholder="1–31"
                  style={{width:"100%",padding:"14px 16px",borderRadius:14,border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(15),color:"#3D2314",outline:"none"}}/>
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:px(13),fontWeight:700,color:"#9B7B62",letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:6,display:"block"}}>Family Group</label>
              <select value={newEvent.group} onChange={e=>setNewEvent(n=>({...n,group:e.target.value}))}
                style={{width:"100%",padding:"14px 16px",borderRadius:14,border:"1.5px solid #F5DDD1",background:"#FAF6F0",fontSize:px(15),color:"#3D2314",outline:"none"}}>
                {groups.map(g=><option key={g.id}>{g.label}</option>)}
              </select>
            </div>
            <BigBtn onClick={handleAddEvent} disabled={!newEvent.title.trim()||!newEvent.day}>Add to Calendar</BigBtn>
          </Overlay>
        )}

        {/* ── EVENT DETAIL SHEET ── */}
        {selectedEvent&&(
          <Overlay onClose={()=>setSelectedEvent(null)}>
            <SheetHandle/>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
              <div style={{width:62,height:62,borderRadius:16,background:"#D4922A",color:"white",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>{selectedEvent.month}</span>
                <span style={{fontSize:26,fontWeight:700,lineHeight:1}}>{selectedEvent.day}</span>
              </div>
              <div>
                <div style={{fontFamily:"Lora,serif",fontSize:px(20),fontWeight:600,color:"#3D2314"}}>{selectedEvent.title}</div>
                <div style={{fontSize:px(13),color:"#9B7B62",marginTop:2}}>{selectedEvent.group}</div>
              </div>
            </div>
            {selectedEvent.time&&<div style={{fontSize:px(15),color:"#6B4C35",marginBottom:8}}>🕐 {selectedEvent.time}</div>}
            {selectedEvent.location&&<div style={{fontSize:px(15),color:"#6B4C35",marginBottom:18}}>📍 {selectedEvent.location}</div>}
            {!selectedEvent.isBirthday&&(
              <>
                <div style={{background:"#FBF0D9",borderRadius:14,padding:"14px 16px",marginBottom:18}}>
                  <div style={{fontSize:px(14),color:"#6B4C35",marginBottom:4}}>✅ {selectedEvent.going+(rsvp[selectedEvent.id]?1:0)} going · 🤔 {selectedEvent.maybe} maybe</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>toggleRsvp(selectedEvent.id)} style={{flex:1,padding:"15px",borderRadius:50,border:"2px solid #D4922A",background:rsvp[selectedEvent.id]?"#D4922A":"transparent",fontSize:px(15),fontWeight:700,color:rsvp[selectedEvent.id]?"white":"#D4922A",cursor:"pointer"}}>{rsvp[selectedEvent.id]?"✅ I'm Going!":"Yes, I'll Be There"}</button>
                  <button style={{flex:1,padding:"15px",borderRadius:50,border:"2px solid #D4922A",background:"transparent",fontSize:px(15),fontWeight:700,color:"#D4922A",cursor:"pointer"}}>Maybe</button>
                </div>
              </>
            )}
          </Overlay>
        )}

        {/* ── COMMENT SHEET ── */}
        {commentOpen!==null&&(()=>{
          const allPosts = Object.values(feedPosts).flat();
          const postItem = allPosts.find(x=>x.id===commentOpen);
          const postCmts = postComments(commentOpen);
          return (
            <div onClick={()=>setCommentOpen(null)} style={{position:"fixed",inset:0,background:"rgba(61,35,20,0.45)",zIndex:60,display:"flex",alignItems:"flex-end",animation:"fadeIn 0.2s ease"}}>
              <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:420,margin:"0 auto",background:t.cardBg,borderRadius:"24px 24px 0 0",maxHeight:"82vh",display:"flex",flexDirection:"column",animation:"slideUp 0.25s ease"}}>
                <div style={{padding:"16px 20px 14px",borderBottom:`1px solid ${t.accentPale}`,flexShrink:0}}>
                  <SheetHandle color={t.accentLight}/>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{fontFamily:"Lora,serif",fontSize:px(18),fontWeight:600,color:"#3D2314"}}>
                      Comments {postCmts.length>0&&<span style={{fontSize:px(14),color:"#9B7B62",fontWeight:400}}>({postCmts.length})</span>}
                    </div>
                    <button onClick={()=>setCommentOpen(null)} style={{background:t.accentPale,border:"none",borderRadius:50,padding:"6px 14px",fontSize:px(14),fontWeight:700,color:t.accentDeep,cursor:"pointer"}}>Close</button>
                  </div>
                  {postItem&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,background:t.bg,borderRadius:12,padding:"10px 12px",border:`1px solid ${t.accentPale}`}}>
                      <span style={{fontSize:20}}>{postItem.avatar}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:px(13),fontWeight:700,color:t.accentDeep}}>{postItem.name}: </span>
                        <span style={{fontSize:px(13),color:"#6B4C35"}}>{postItem.caption||postItem.status||postItem.title}</span>
                      </div>
                    </div>
                  )}
                </div>
                <div className="scrollbar-hide" style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
                  {postCmts.length===0&&(
                    <div style={{textAlign:"center",padding:"36px 0",color:"#9B7B62"}}>
                      <div style={{fontSize:40,marginBottom:10}}>💬</div>
                      <div style={{fontSize:px(15),fontWeight:700,color:"#6B4C35",marginBottom:6}}>No comments yet</div>
                      <div style={{fontSize:px(14)}}>Be the first to say something!</div>
                    </div>
                  )}
                  {postCmts.map((c,i)=>(
                    <div key={c.id} style={{display:"flex",gap:12,marginBottom:18,animation:"fadeUp 0.25s ease both",animationDelay:`${i*0.05}s`}}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:t.accentPale,border:`2px solid ${t.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,marginTop:2}}>{c.avatar}</div>
                      <div style={{flex:1}}>
                        <div style={{background:t.bg,borderRadius:"6px 18px 18px 18px",padding:"12px 16px",display:"inline-block",maxWidth:"100%",border:`1px solid ${t.accentPale}`}}>
                          <div style={{fontSize:px(13),fontWeight:800,color:t.accentDeep,marginBottom:4}}>{c.name}</div>
                          <div style={{fontSize:px(15),color:"#3D2314",lineHeight:1.55}}>{c.text}</div>
                        </div>
                        <div style={{fontSize:px(12),color:"#9B7B62",marginTop:5,paddingLeft:4}}>{c.time}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"12px 16px 32px",borderTop:`1px solid ${t.accentPale}`,flexShrink:0,background:t.cardBg}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:t.accentPale,border:`2px solid ${t.accentLight}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{obAvatar||"👩"}</div>
                    <div style={{flex:1,background:t.bg,borderRadius:20,border:`2px solid ${t.accentPale}`,display:"flex",alignItems:"center",padding:"10px 16px",gap:10}}>
                      <input value={commentInput} onChange={e=>setCommentInput(e.target.value)}
                        onKeyDown={e=>{ if(e.key==="Enter"&&commentInput.trim()) handleAddComment(commentOpen); }}
                        placeholder="Say something warm... 🧡"
                        style={{flex:1,background:"none",border:"none",outline:"none",fontSize:px(15),color:"#3D2314"}}/>
                      <button onClick={()=>handleAddComment(commentOpen)} disabled={!commentInput.trim()}
                        style={{width:36,height:36,borderRadius:"50%",background:commentInput.trim()?t.accent:"#D4B8A8",border:"none",color:"white",fontSize:18,cursor:commentInput.trim()?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background 0.15s"}}>
                        ↑
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── UPLOAD FLOW ── */}
        <UploadSheet />

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KeepUp/>);
document.getElementById("splash").style.display = "none";
</script>
</body>
</html>
